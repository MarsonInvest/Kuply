function tweenNum(el,from,to,dur){if(!el)return;const t0=performance.now();function fr(t){const k=Math.min(1,(t-t0)/dur);const e=1-Math.pow(1-k,3);const v=from+(to-from)*e;el.textContent=CZKm(v);if(k<1)requestAnimationFrame(fr);}requestAnimationFrame(fr);}
function paintCalc(lo,hi,instant){const elLo=document.getElementById('calcLo'),elHi=document.getElementById('calcHi');if(!elLo)return;if(instant){elLo.textContent=CZKm(lo);elHi.textContent=CZKm(hi);}else{tweenNum(elLo,store.calc.shownLo||lo,lo,520);tweenNum(elHi,store.calc.shownHi||hi,hi,520);}store.calc.shownLo=lo;store.calc.shownHi=hi;}
function paintTrack(lo,mid,hi){const a=document.getElementById('ckMin');if(!a)return;a.textContent=CZKm(lo);const m=document.getElementById('ckMid');if(m)m.textContent='STŘED · '+CZKm(mid);const x=document.getElementById('ckMax');if(x)x.textContent=CZKm(hi);}
function paintViews(){const v=priceViews();const a=document.getElementById('pvPortal');if(!a)return;a.textContent=CZKm(v.portal);const b=document.getElementById('pvBanka');if(b)b.textContent=CZKm(v.banka);const k=document.getElementById('pvKuply');if(k)k.textContent=CZKm(v.kuply);const pl=document.getElementById('pvPlus');if(pl)pl.textContent='+'+Math.round((v.kuply/v.portal-1)*100)+' %';}
const CMSG={district:'Lokalita je pro investory zásadní.',type:'Dispozice upravena.',m2:'Plochu mám.',condition:'Stav hodně rozhoduje o ceně.',park:'Parkování investory zajímá.',floor:'Patro a výtah hrají roli.'};
function updateCalc(key,val,el){const old=calcEst();store.calc[key]=val;store.calc.touched[key]=1;
  if(el){[...el.parentNode.children].forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}
  if(key==='m2'){const m=document.getElementById('ccM2');if(m)m.textContent=val+' m²';const rng=document.getElementById('ccRng');if(rng)rng.style.setProperty('--p',((val-25)/135*100)+'%');}
  const neu=calcEst();const pct=old?Math.round((neu/old-1)*100):0;
  const r=calcRange();paintCalc(r[0],r[2],false);paintTrack(r[0],r[1],r[2]);paintViews();
  const af=document.getElementById('accFill');if(af)af.style.width=calcAcc()+'%';const an=document.getElementById('accN');if(an)an.textContent=calcAcc()+' % přesnost';
  const dEl=document.getElementById('calcDelta');if(dEl){if(pct!==0){dEl.className='calc-delta '+(pct>0?'up':'down');dEl.innerHTML=(pct>0?'▲ +':'▼ ')+Math.abs(pct)+' %';}else{dEl.className='calc-delta';dEl.textContent='';}}
  const b=document.getElementById('calcBubble');if(b)b.textContent=(pct>0?'Hezky, odhad povyskočil nahoru. ':pct<0?'Beru na vědomí. ':'')+(CMSG[key]||'')+(['condition','park','floor'].includes(key)?` ${val}: ${pct>=0?'+':''}${pct} %.`:'');}
function calcToIntake(){Object.assign(store.draft,{district:store.calc.district,type:store.calc.type,m2:store.calc.m2,condition:store.calc.condition});store.view='intake';store.intakeStep=1;window.scrollTo(0,0);render();}

function Intake(){const s=store.intakeStep,d=store.draft;
  const pose={1:'hero',2:'happy',3:'wink',4:'peek',5:'wow'}[s];
  const bubbles={1:'Zkontrolujte detaily. Čím přesnější, tím lepší nabídky dostanete.',2:'Fotky a video udělají největší rozdíl — investoři pak nabízejí sebevědoměji a výš.',3:'Vyberte úschovu. Obě varianty jsou plně chráněné — vyberte, čemu věříte víc.',4:'Skoro hotovo — kam vám pošlu výsledek a nabídky?',5:'A je to! Tady je váš výsledek. Pustíme do toho investory?'};

    <div class="summ"><div><div class="si">Lokalita</div><div class="sv">${d.district}</div></div><div><div class="si">Dispozice</div><div class="sv">${d.type}</div></div><div><div class="si">Plocha</div><div class="sv">${d.m2} m²</div></div><div><div class="si">Stav</div><div class="sv">${d.condition}</div></div></div>
    <div class="row2"><div class="field"><label>Patro</label><select onchange="setDraft('floor',this.value)">${['Přízemí','1. patro','2. patro','3. patro','4. patro','5.+ patro'].map(x=>`<option ${x===d.floor?'selected':''}>${x}</option>`).join('')}</select></div>
    <div class="field"><label>Přesná adresa (neveřejné)</label><input placeholder="Např. Sokolovská 1124" value="${d.addr}" oninput="store.draft.addr=this.value"></div></div>
    <div class="tip">${icBulb()}<div><b>Sofia radí:</b> přesné parametry pomáhají investorům nabídnout sebevědomě a výš. Nejistota cenu sráží.</div></div></div>`;}
  else if(s===2){body=`<div class="istep"><h2>Fotky a krátké video</h2><p class="sub">Z videa připravíme 3D prohlídku. Tohle nejvíc zvyšuje nabídky.</p>
    <div class="uploader ${d.uploaded?'done':''}" onclick="fakeUpload()"><div style="margin-bottom:10px">${d.uploaded?vtick():icUpload()}</div>
      <div style="font-weight:600;font-size:15px">${d.uploaded?'Nahráno · 6 fotek + video (0:42)':'Klikněte pro nahrání'}</div>
      <div style="font-size:13px;color:var(--ink-50);margin-top:4px">${d.uploaded?'Připraveno k odeslání':'Z mobilu, na šířku, s rozsvícenými světly'}</div></div>
    <div class="tip">${icBulb()}<div><b>Sofia radí:</b> nahrávejte na šířku, rozsviťte světla a procházejte pomalu. Nemovitosti s videem mívají vyšší a více nabídek.</div></div></div>`;}
  else if(s===3){body=`<div class="istep"><h2>Bezpečná úschova</h2><p class="sub">Kdo pohlídá kupní cenu a převod. Obě varianty jsou nezávislé a plně chráněné.</p>
    <div class="escrow">
      <div class="esc-opt ${d.escrow==='advokat'?'sel':''}" onclick="setDraft('escrow','advokat')"><div class="ei">${icScale()}</div><h4>Advokátní úschova</h4><p>Smlouvu i úschovu vede partnerská advokátní kancelář. Klasika, kterou zná každý notář i banka.</p></div>
      <div class="esc-opt ${d.escrow==='trinity'?'sel':''}" onclick="setDraft('escrow','trinity')"><div class="ei">${icBank()}</div><h4>Trinity Bank</h4><p>Bankovní úschova v regulovaném prostředí. Pro kupující navíc předschválené financování.</p></div></div>
    <div class="field" style="margin-top:18px"><label>Jak dlouho má sběr nabídek běžet?</label><div class="chipset">${[24,48,72].map(h=>`<button class="chip ${h===d.hours?'sel':''}" onclick="setDraft('hours',${h})">${h} hodin</button>`).join('')}</div></div></div>`;}
  else if(s===4){body=`<div class="istep"><h2>Kam pošleme výsledek?</h2><p class="sub">Zadejte kontakt a hned vám ukážu přesný rozbor ceny. Bez hesla, bez spamu.</p>
    <div class="row2"><div class="field"><label>Jméno a příjmení</label><input placeholder="Jan Novák" value="${d.name||''}" oninput="store.draft.name=this.value"></div>
    <div class="field"><label>Telefon</label><input placeholder="+420 ___ ___ ___" value="${d.phone}" oninput="store.draft.phone=this.value"></div></div>
    <div class="field"><label>E-mail</label><input placeholder="vy@email.cz" value="${d.email}" oninput="store.draft.email=this.value"></div>
    <div class="tip">${icLock(16)}<div>Šifrováno · GDPR · kontakt slouží jen k zaslání rozboru a nabídek.</div></div></div>`;}
  else{const v=priceViews();body=`<div class="istep"><div style="text-align:center;margin-bottom:6px">${owl('wow',92,'owl-float')}</div>
    <h2 style="text-align:center">Váš výsledek je tu.</h2><p class="sub" style="text-align:center;margin-bottom:18px">Tři pohledy na cenu vaší nemovitosti — od opatrné banky až po cenu, kterou vytlačí zájem investorů.</p>
    <div class="pv3" style="margin-top:0">
      <div class="pv"><div class="pv-h">Bankovní odhad</div><div class="pv-v">${CZKm(v.banka)}</div><div class="pv-bar"><i style="width:46%"></i></div><p>Opatrný pohled banky — bývá nejníž.</p></div>
      <div class="pv gold"><div class="pv-h">Portálový odhad</div><div class="pv-v">${CZKm(v.portal)}</div><div class="pv-bar"><i style="width:70%"></i></div><p>Anonymní průměr z inzertních portálů.</p></div>

    </div>

  const reveal=s===5;
  return `<div class="intake"><div class="intake-grid">

        ?`<button class="btn btn-ghost" onclick="iStep(4)">Zpět</button><button class="btn btn-pri btn-lg" onclick="submitProperty()">Spustit nabídky od investorů ${icArr()}</button>`

function fakeUpload(){store.draft.uploaded=true;render();toast('Soubory nahrány');}
function submitProperty(){const d=store.draft;const est=estimate(d);const p=mkProp(d.district,d.type,d.m2,d.floor,d.condition,est,d.hours,d.addr||'(neuvedeno)');p.escrow=d.escrow;p.vetted=false;store.properties.unshift(p);store.myPropId=p.id;scheduleVetting(p);store.view='seller';store.nav='overview';window.scrollTo(0,0);render();toast('Nemovitost přijata · spouštíme právní prověření');}
function scheduleVetting(p){setTimeout(()=>{if(p.status!=='active')return;p.vetted=true;scheduleMockOffers(p);if(store.view==='seller'){render();toast('Lead právně prověřen · teď ho vidí investoři');}},3200);}

/* ===================== SHELL ===================== */
function shell(role,inner){
  const navS=[['overview','Přehled',icGrid()],['property','Moje nemovitost',icHome()],['chat','Sofia',icChat()],['help','Otázky',icBulb()]];
  const navI=[['flow','Tržiště',icGrid()],['pujcky','Půjčky',icBank()],['mine','Moje nabídky',icCoins()],['won','Vyhrané',icKey()],['programs','Programy',icBolt()],['offmarket','Off-market',icEye()],['faq','Otázky',icBulb()]];
  const navT=[['tips','Moje tipy',icCoins()],['how','Jak to chodí',icBulb()]];
  const navL=[['overview','Moje žádost',icHome()],['help','Otázky',icBulb()]];
  const navs=role==='seller'?navS:role==='investor'?navI:role==='loan'?navL:navT;
  const act=role==='seller'?store.nav:role==='investor'?store.tab:role==='loan'?(store.lnNav||'overview'):store.tnav||'tips';
  const setter=role==='seller'?'store.nav':role==='investor'?'store.tab':role==='loan'?'store.lnNav':'store.tnav';
  const user={seller:['VN','Vaše nemovitost','Prodávající'],investor:['PI','Petr Investor','Ověřený investor'],tipar:['JT','Jan Tipař','Tipař · partner'],loan:['ŽP','Vaše žádost','Žadatel o půjčku']}[role];
  return `<div class="app bg-${store.bg||'classic'}">${(store.bg&&store.bg!=='classic'&&BGVID[store.bg])?`<video class="app-bgv" autoplay muted loop playsinline preload="auto" onloadeddata="this.playbackRate=0.6"><source src="videa/${BGVID[store.bg]}.mp4" type="video/mp4"></video><div class="app-bgveil"></div>`:''}<div class="app-grain"></div><aside class="side"><div class="side-brand">${owl('hero',40)}<b>Kuply</b></div><button class="navtoggle" onclick="this.closest('.side').classList.toggle('open')" aria-label="Menu"><i></i></button><div class="snav-wrap"><div class="snav-inner">${navs.map(n=>`<div class="snav ${n[0]===act?'active':''}" onclick="${setter}='${n[0]}';render()">${n[2]}<span>${n[1]}</span></div>`).join('')}</div></div>${widgetDock()}
    ${role==='investor'?'':sofiaCard(role)}
    <div class="side-user"><div class="ua">${user[0]}</div><div><div class="un">${user[1]}</div><div class="ur">${user[2]}</div></div></div></aside>
    <main class="dmain">${inner}<div class="dgap"></div>${dfoot()}</main>${sceneSwitcher()}${widgetPop()}</div>`;}
function sofiaTip(role){
  if(role==='loan')return lnGuide();
  if(role==='seller'){const p=store.properties.find(x=>x.id===store.myPropId);
    if(p&&p.status==='accepted')return 'Prodáno! Teď hlídám každý krok převodu za vás — sledujte postup v přehledu.';
    if(p&&!p.vetted)return 'Právě prověřuji vaši nemovitost. Než to doběhne, klidně doplňte fotky — zvednou nabídky.';
    if(p&&p.offers&&p.offers.length)return 'Nabídky chodí. Porovnejte si je nahoře — nejvyšší cena nemusí být vždy nejlepší volba.';
    return 'Jakmile zadáte nemovitost, ukážu vám nabídky investorů v reálném čase.';}
  if(role==='investor')return 'Prověřené leady — prodeje i půjčky. Filtrujte podle parametrů a pošlete nabídku.';

/* ----- Strukturované porovnání: nejvyšší / nejrychlejší / nejjistější ----- */
function compareStrip(p){
  if(p.offers.length<2)return'';
  const top=p.offers[0];
  const fastest=[...p.offers].sort((a,b)=>a.days-b.days||b.amount-a.amount)[0];
  const cash=p.offers.filter(o=>o.finance==='Hotovost').sort((a,b)=>b.amount-a.amount);
  const safest=cash[0]||null;
  const dominant=(fastest.id===top.id)&&(!safest||safest.id===top.id);
  const cards=[];
  cards.push(cmpCard('win',icArrUp(),'Nejvyšší cena',top,top.amount>p.estimate?`+${Math.round((top.amount/p.estimate-1)*100)} % nad odhadem`:`${Math.round(top.amount/p.estimate*100)} % odhadu`));
  if(!dominant){
    if(fastest.id!==top.id)cards.push(cmpCard('fast',icClock2(),'Nejrychlejší převod',fastest,`do ${fastest.days} dní · ${fastest.finance.toLowerCase()}`));
    if(safest&&safest.id!==top.id&&safest.id!==fastest.id)cards.push(cmpCard('safe',icShield(16),'Nejjistější · hotovost',safest,'bez rizika financování'));
  }
  const head=dominant
    ?`${icSpark()}Jedna nabídka vede ve všech ohledech`
    :`${icSpark()}Vyberte podle toho, co je pro vás důležité`;
  return `<div class="cmp"><div class="cmp-head">${head}</div><div class="cmp-grid">${cards.join('')}</div></div>`;
}

}

var CALCV='';

function icScale(){return `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M7 21h10M5 7h14M5 7l-2.5 6a3 3 0 0 0 5 0L5 7Zm14 0-2.5 6a3 3 0 0 0 5 0L19 7Z"/><path d="M12 3 5 7M12 3l7 4"/></svg>`}
function icBank(){return `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10 12 4l9 6"/><path d="M5 10v8M9.5 10v8M14.5 10v8M19 10v8"/><path d="M3 21h18"/></svg>`}

/* ===================== PŮJČKY (loan marketplace) ===================== */
const LNTYPES=['Byt 2+kk','Byt 3+kk','Byt 4+kk','Rodinný dům','Komerční prostor'];
const LNCOND=['Novostavba/po rekonstrukci','Dobrý stav','Původní stav'];
const LN_INV=['Vltava Capital','BytFond a.s.','Reinvest CZ','Trinity Privátní','Domov Invest'];
function lnLtv(a,v){return v>0?a/v*100:0;}
function lnCol(l){return l<=60?'var(--positive)':l<=80?'var(--gold-d)':'var(--rust)';}
function lnMonthly(P,rate,years){const r=rate/100/12,n=years*12;if(r<=0)return P/n;return P*r/(1-Math.pow(1+r,-n));}
function lnCalc(o){const m=lnMonthly(o.amount,o.rate,o.term),fee=o.amount*(o.fee||0)/100,total=m*o.term*12+fee,over=total-o.amount,rpsn=(Math.pow(total/o.amount,1/o.term)-1)*100;return{m,fee,total,over,rpsn};}
function lnEst(d){return estimate({district:d.district,m2:d.m2,condition:d.condition});}
function lnPct(n){return n.toFixed(1).replace('.',',')+' %';}
function lnY(n){return n===1?'rok':n<5?'roky':'let';}

/* ---- Sofia pro žadatele (ujišťuje); investor dostává minimum jinde ---- */
function lnGuide(){const L=store.ln,d=L.draft,l=lnLtv(d.amount,d.value);
  if(L.accepted)return 'Hotovo. Smlouvu a zástavu připraví advokát — o každém kroku dám vědět.';
  if(L.lead){return L.offers.length?'Porovnejte <b>RPSN</b>, ne jen úrok — poplatky se počítají. Nejvýhodnější máte nahoře.':'Žádost je v systému. Brzy dorazí první nezávazné nabídky. Dokud nepřijmete, nic neplatíte.';}
  if(L.step===0)return 'Zástava je jen jištění — <b>nemovitost zůstává vaše</b>.';
  if(L.step===1)return 'Hodnotu spočítám hned z parametrů. Máte-li <b>znalecký posudek</b>, nahrajte ho — zpřesní LTV.';
  if(L.step===2){if(l<=60)return `<b>LTV ${Math.round(l)} %</b> — bezpečné, čekejte nízký úrok.`;if(l<=80)return `<b>LTV ${Math.round(l)} %</b> — v normě.`;return `<b>LTV ${Math.round(l)} %</b> nad 80 % je <b>rizikové</b> — zvažte nižší částku.`;}
  return 'Jméno a adresu uvidí investor až <b>po přijetí</b> nabídky.';
}

function LoanApp(){const L=store.ln;
  if(L.accepted)return shell('loan',LoanSuccess());
  if(L.lead){if(store.lnNav==='help')return shell('loan',SellerFaq());return shell('loan',LoanDash())+(L.confirm?lnConviction():'');}
  return LoanFlow();
}

/* ---- vícekrokový lead (žádost) ---- */
function lnSet(k,v){store.ln.draft[k]=v;render();}
function lnStep(n){if(n<0){go('landing');return;}const L=store.ln;if(L.draft.valMode==='auto')L.draft.value=lnEst(L.draft);L.step=Math.min(3,n);window.scrollTo(0,0);render();}
function lnOnDist(v){store.ln.draft.district=v;if(store.ln.draft.valMode==='auto')store.ln.draft.value=lnEst(store.ln.draft);render();}
function lnOnM2(v){store.ln.draft.m2=+v||0;if(store.ln.draft.valMode==='auto')store.ln.draft.value=lnEst(store.ln.draft);}
function lnValMode(m){store.ln.draft.valMode=m;if(m==='auto')store.ln.draft.value=lnEst(store.ln.draft);render();}
function lnUpload(){store.ln.draft.posudek=true;render();toast('Znalecký posudek nahrán');}
function lnOnAmount(v){store.ln.draft.amount=+v||0;lnRefresh();}
function lnContactOk(){const d=store.ln.draft;return /\S+@\S+\.\S+/.test(d.email)&&d.phone.replace(/[^\d]/g,'').length>=9;}
function lnOnContact(k,v){store.ln.draft[k]=v;const b=document.getElementById('lnSubmit');if(b)b.disabled=!lnContactOk();}
function lnRefresh(){const d=store.ln.draft,l=lnLtv(d.amount,d.value),col=lnCol(l);
  const p=document.getElementById('ln-ltvpct'),f=document.getElementById('ln-ltvfill'),n=document.getElementById('ln-ltvnote'),g=document.getElementById('ln-guide');
  if(p){p.textContent=Math.round(l)+' %';p.style.color=col;}
  if(f){f.style.width=Math.min(100,l)+'%';f.style.background=col;}
  if(n){n.style.color=col;n.textContent=l<=60?'Bezpečné — nízký úrok a hodně nabídek.':l<=80?'V normě — většina investorů půjčuje sem.':'Vysoké — počítejte s opatrnějšími, dražšími nabídkami.';}
  if(g)g.innerHTML=lnGuide();
}
function LoanFlow(){const L=store.ln,d=L.draft,s=L.step;
  const prog=[0,1,2,3].map(i=>`<i class="lnp ${i<=s?'on':''}"></i>`).join('');
  let body='';
  if(s===0){body=`<div class="lnstep"><h2>Vaše nemovitost</h2><p class="sub">Co dáte do zástavy. Zůstává vaše — slouží jen jako jištění půjčky.</p>
    ${d.propNote?`<div class="lnguide" style="margin:0 0 14px"><span class="so">${owl('peek',22)}</span><span>Z vašeho dotazu: <b>${d.propNote}</b> — zkontrolujte a doplňte parametry níže.</span></div>`:''}
    <div class="row2"><div class="field" style="margin-bottom:14px"><label>Typ</label><select onchange="lnSet('type',this.value)">${LNTYPES.map(t=>`<option ${t===d.type?'selected':''}>${t}</option>`).join('')}</select></div>
      <div class="field" style="margin-bottom:14px"><label>Lokalita</label><select onchange="lnOnDist(this.value)">${DLIST.map(t=>`<option ${t===d.district?'selected':''}>${t}</option>`).join('')}</select></div></div>
    <div class="row2"><div class="field" style="margin-bottom:0"><label>Plocha (m²)</label><input type="number" value="${d.m2}" oninput="lnOnM2(this.value)"></div>
      <div class="field" style="margin-bottom:0"><label>Stav</label><select onchange="lnSet('condition',this.value)">${LNCOND.map(c=>`<option ${c===d.condition?'selected':''}>${c}</option>`).join('')}</select></div></div></div>`;}
  else if(s===1){const vm=d.valMode||'auto',est=lnEst(d);
    body=`<div class="lnstep"><h2>Hodnota nemovitosti</h2><p class="sub">Určuje, kolik vám půjčíme a slouží pro zástavu — proto se nepíše „od oka". Vyberte, jak ji doložíte.</p>
    <div class="valopts">
      <button class="valopt ${vm==='auto'?'on':''}" onclick="lnValMode('auto')"><span class="vi">${icSpark()}</span><b>Odhad Kuply</b><span>Spočítáme hned z parametrů.</span></button>
      <button class="valopt ${vm==='posudek'?'on':''}" onclick="lnValMode('posudek')"><span class="vi">${icScroll()}</span><b>Znalecký posudek</b><span>Mám odhad od znalce — nahraju ho.</span></button></div>
    ${vm==='auto'
      ? `<div class="lngauge"><div class="lngauge-top"><span style="font-size:13px;font-weight:600;color:var(--ink-70)">Odhad Kuply</span><b>${CZK(est)}</b></div>
          <div style="font-size:12.5px;color:var(--ink-60)">${d.type} · ${d.district} · ${d.m2} m²</div>
          <div class="lnnote" style="color:var(--ink-60);font-weight:500">Orientační. Pro závaznou nabídku zajistíme znalecký posudek (v ceně).</div></div>`
      : `<div class="lnup ${d.posudek?'done':''}" onclick="lnUpload()"><div style="margin-bottom:8px">${d.posudek?vtick():icUpload()}</div><b style="font-size:14.5px">${d.posudek?'Posudek nahrán':'Nahrát znalecký posudek'}</b><div style="font-size:12.5px;color:var(--ink-60);margin-top:3px">${d.posudek?'Hodnotu doplňte níže dle posudku':'PDF od soudního znalce'}</div></div>
        ${d.posudek?`<div class="field" style="margin:14px 0 0"><label>Hodnota dle posudku (Kč)</label><input type="number" value="${d.value}" oninput="store.ln.draft.value=+this.value||0"></div>`:''}`}</div>`;}
  else if(s===2){const l=lnLtv(d.amount,d.value),col=lnCol(l);
    body=`<div class="lnstep"><h2>Kolik a na jak dlouho</h2><p class="sub">Kolik chcete půjčit a na jakou dobu. LTV počítám živě.</p>
    <div class="field"><label>Kolik chci půjčit (Kč)</label><input type="number" value="${d.amount}" oninput="lnOnAmount(this.value)"></div>
    <div class="field" style="margin-bottom:0"><label>Doba splatnosti</label><div class="chipset">${[1,3,5,10,15].map(y=>`<button class="chip ${y===d.term?'on':''}" onclick="lnSet('term',${y})">${y} ${y===1?'rok':y<5?'roky':'let'}</button>`).join('')}</div></div>
    <div class="lngauge"><div class="lngauge-top"><span style="font-size:13px;font-weight:600;color:var(--ink-70)">Vaše LTV</span><b id="ln-ltvpct" style="color:${col}">${Math.round(l)} %</b></div>
      <div class="lnbar"><i id="ln-ltvfill" style="width:${Math.min(100,l)}%;background:${col}"></i></div>
      <div class="lnzones"><span>0 %</span><span>bezpečné 60 %</span><span>strop 80 %</span><span>100 %</span></div>
      <div class="lnnote" id="ln-ltvnote" style="color:${col}">${l<=60?'Bezpečné — nízký úrok a hodně nabídek.':l<=80?'V normě — většina investorů půjčuje sem.':'Vysoké — počítejte s opatrnějšími, dražšími nabídkami.'}</div></div></div>`;}
  else{body=`<div class="lnstep"><h2>Kam pošleme váš dashboard?</h2><p class="sub">Na e-mail dorazí odkaz na váš unikátní přehled s nabídkami. Bez hesla, bez spamu.</p>
    <div class="field"><label>Jméno a příjmení</label><input value="${d.name}" placeholder="Jan Novák" oninput="store.ln.draft.name=this.value"></div>
    <div class="field"><label>E-mail</label><input type="email" value="${d.email}" placeholder="vy@email.cz" oninput="lnOnContact('email',this.value)"></div>
    <div class="field" style="margin-bottom:0"><label>Telefon</label><input type="tel" value="${d.phone}" placeholder="+420 777 123 456" oninput="lnOnContact('phone',this.value)"></div>
    <div class="dnote" style="margin-top:14px;display:flex;gap:10px;align-items:flex-start">${icLock(16)}<div>Na e-mail pošleme odkaz na váš <b>unikátní dashboard</b>, nabídky a další kroky. Šifrováno · GDPR.</div></div></div>`;}
  const last=s===3;
  const nav=`<div class="lnnav"><button class="btn btn-ghost" onclick="lnStep(${s-1})">${s===0?'Zpět na web':'Zpět'}</button>
    ${last?`<button class="btn btn-gold" id="lnSubmit" ${lnContactOk()?'':'disabled'} onclick="submitLoanLead()">Odeslat žádost ${icArr()}</button>`
      :`<button class="btn btn-gold" onclick="lnStep(${s+1})">Pokračovat ${icArr()}</button>`}</div>`;
  return `<div class="lnflow"><div class="lnflow-card">
    <div class="lnflow-brand">${owl('hero',26)}<b>Kuply</b><span>· Žádost o půjčku · krok ${s+1}/4</span></div>
    <div class="lnprog">${prog}</div>${body}
    <div class="lnguide"><span class="so">${owl('peek',22)}</span><span id="ln-guide">${lnGuide()}</span></div>${nav}
    <div class="lntrust"><span>${icShield()} Nemovitost zůstává vaše</span><span>${icScale()} Smlouva přes advokáta</span><span>${icLock()} Bez závazku, dokud nepřijmete</span></div></div></div>`;
}
function submitLoanLead(){const d=store.ln.draft;
  store.ln.lead={id:'PJ-'+uid(),type:d.type,district:d.district,m2:d.m2,condition:d.condition,value:d.value,amount:d.amount,term:d.term,ltv:lnLtv(d.amount,d.value),posudek:d.posudek,vetted:false,ts:now()};
  store.ln.offers=[];store.lnNav='overview';go('loan');toast('Žádost přijata · spouštíme prověření');
  setTimeout(()=>{const L=store.ln;if(!L.lead)return;L.lead.vetted=true;if(store.view==='loan')render();toast('Lead prověřen · investoři ho teď vidí');scheduleLoanOffers();},2600);
}
function scheduleLoanOffers(){const base=store.ln.lead;const br=base.ltv<=50?5.6:base.ltv<=70?7.0:base.ltv<=80?8.6:10.5;
  [3500,8000,14000].forEach((ms,i)=>setTimeout(()=>{const L=store.ln;if(!L.lead)return;
    const rate=+(br+(Math.random()*1.6-0.7)+i*0.1).toFixed(1);
    const amt=i===0?base.amount:Math.min(base.amount,Math.round(base.value*(base.ltv>80?0.72:0.8)/10000)*10000);
    pushLoanOffer({investor:LN_INV[Math.floor(Math.random()*LN_INV.length)],rate,amount:amt,term:base.term,fee:+(0.5+Math.random()*1.5).toFixed(1)});
    if(store.view==='loan')toast('Nová nabídka půjčky');},ms));}
function pushLoanOffer(o){o.id=uid();const c=lnCalc(o);o.monthly=c.m;o.rpsn=c.rpsn;o.total=c.total;o.over=c.over;store.ln.offers.push(o);store.ln.offers.sort((a,b)=>a.rpsn-b.rpsn);if(store.view==='loan')render();}

/* ---- žadatelův dashboard (kvalita Seller) ---- */
function LoanDash(){const L=store.ln,l=L.lead,offs=L.offers,best=offs[0],col=lnCol(l.ltv);
  const lowRate=offs.length?offs.reduce((a,b)=>b.rate<a.rate?b:a):null;
  let cmp='';
  if(offs.length>=2){const cards=[lnCmpCard('win',icArrUp(),'Nejvýhodnější celkem',best,`RPSN ${lnPct(best.rpsn)} · přeplatek ${CZKm(best.over)}`)];
    if(lowRate&&lowRate.id!==best.id)cards.push(lnCmpCard('cheap',icCoins(14),'Nejnižší úrok',lowRate,`úrok ${lnPct(lowRate.rate)} · RPSN ${lnPct(lowRate.rpsn)}`));
    cmp=`<div class="dpanel" style="margin-top:18px"><div class="dpanel-h"><h3>Doporučení</h3><span style="font-size:12px;color:var(--ink-50)">řazeno dle RPSN</span></div><div class="dpanel-b"><div class="cmp-grid">${cards.join('')}</div></div></div>`;}
  return `<div class="dtop"><div><div class="greet">Žádost o půjčku · ${l.id}</div><h1>${l.type} · ${l.district.split('–')[1]?.trim()||l.district}</h1></div>
      <div class="dtop-r">${l.vetted?'<span class="dchip"><span class="live-blink"></span> Sbírám nabídky</span>':'<span class="dchip vet"><span class="live-blink"></span> Právní prověření</span>'}</div></div>
    ${l.vetted?'':`<div class="vetbar"><div class="vb-ic">${icScale()}</div><div><div class="vb-t">Probíhá prověření vaší žádosti</div><div class="vb-d">Kontrolujeme nemovitost a zástavu. Jakmile je čisto, uvidí ji prověření investoři a začnou chodit nabídky.</div></div><div class="vb-pill">${icLock(14)} Bezpečně</div></div>`}
    <div class="dstats">
      <div class="dstat"><div class="dl">${icCoins(14)} Chci půjčit</div><div class="dv">${CZKm(l.amount)}</div><div class="dsub">na ${l.term} ${lnY(l.term)}</div></div>
      <div class="dstat"><div class="dl">${icShield(14)} LTV</div><div class="dv" style="color:${col}">${Math.round(l.ltv)} %</div><div class="dsub">hodnota ${CZKm(l.value)}</div></div>
      <div class="dstat"><div class="dl">${icArrUp()} Nabídek</div><div class="dv">${offs.length}</div><div class="dsub">${best?'nejlepší RPSN '+lnPct(best.rpsn):'čekám na první'}</div></div></div>
    ${cmp}
    <div class="dpanel" style="margin-top:18px"><div class="dpanel-h"><h3>Nabídky půjček</h3><span style="font-size:12px;color:var(--ink-50)">${offs.length?'řazeno od nejvýhodnější':''}</span></div>
      <div class="dpanel-b">${offs.length?offs.map((o,i)=>lnOfferRow(o,i)).join(''):`<div class="empty">${icClock()}<div>${l.vetted?'Zatím žádné nabídky.<br>První obvykle dorazí během pár minut.':'Probíhá právní prověření.'}</div></div>`}</div></div>`;
}
function lnCmpCard(kind,ico,label,o,sub){return `<div class="cmp-card ${kind==='win'?'win':'cheap'}"><div class="cmp-lab"><span class="ico">${ico}</span>${label}</div>
  <div><div class="cmp-val">${lnPct(o.rate)}</div><div class="cmp-sub">${CZK(o.monthly)}/měs · ${sub}</div></div>
  <button class="btn btn-gold btn-sm cmp-pick" onclick="askLnAccept('${o.id}')">Vybrat</button></div>`;}
function lnOfferRow(o,i){return `<div class="doffer ${i===0?'top':''}"><div class="oc-l"><div class="av">${o.investor.slice(0,2).toUpperCase()}</div>
  <div><div class="oi-name">${o.investor} ${vtick()}</div><div class="oi-meta">${i===0?'<span class="badge-top">Nejvýhodnější</span>':''}<span class="mtag">${CZK(o.amount)}</span><span class="mtag">${o.term} ${lnY(o.term)}</span><span class="mtag g" style="background:rgba(201,168,118,.18);color:var(--gold-d)">RPSN ${lnPct(o.rpsn)}</span><span class="mtag">poplatek ${lnPct(o.fee)}</span></div></div></div>
  <div style="display:flex;align-items:center;gap:14px"><div style="text-align:right"><div class="lno-rate">${lnPct(o.rate)}</div><div style="font-size:11.5px;color:var(--ink-60)">${CZK(o.monthly)}/měs</div></div><button class="btn btn-gold btn-sm" onclick="askLnAccept('${o.id}')">Přijmout</button></div></div>`;}
function askLnAccept(id){store.ln.confirm=id;render();}
function lnCloseConfirm(){store.ln.confirm=null;render();}
function lnConviction(){const o=store.ln.offers.find(x=>x.id===store.ln.confirm);if(!o)return'';
  return `<div class="modal-bg" onclick="if(event.target===this)lnCloseConfirm()"><div class="modal modal-conv">
    <button class="modal-x" onclick="lnCloseConfirm()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <div class="conv-top"><div class="owl-float" style="display:inline-block">${owl('happy',86)}</div><div class="conv-h">Přijmout tuto nabídku půjčky?</div>
      <div class="conv-sub">Rozhodujete vy — závazné je to až po podpisu smlouvy. Do té doby vás nic neváže.</div></div>
    <div class="modal-c" style="padding-top:16px"><div class="conv-amt">${CZK(o.amount)}</div>
      <div style="text-align:center"><span class="conv-delta">úrok ${lnPct(o.rate)} · ${CZK(o.monthly)}/měs</span></div>
      <div class="conv-sum">${convRow('Investor',`${o.investor} ${vtick()}`)}${convRow('Doba splatnosti',o.term+' '+lnY(o.term))}${convRow('RPSN',lnPct(o.rpsn))}${convRow('Celkem zaplatíte',CZK(o.total))}${convRow('Nemovitost','<b style="color:var(--positive)">zůstává vaše</b>')}</div>
      <div class="conv-note">${icLock(16)}<div>Po přijetí připraví advokát smlouvu a zástavní právo. Peníze nikdy nejdou přes Kuply.</div></div>
      <div class="conv-acts"><button class="btn btn-ghost" onclick="lnCloseConfirm()">Ještě zvážím</button><button class="btn btn-gold" onclick="acceptLoan('${o.id}')">Závazně přijmout ${icArr()}</button></div></div></div></div>`;}
function acceptLoan(id){const o=store.ln.offers.find(x=>x.id===id);if(!o)return;store.ln.accepted=o;store.ln.confirm=null;window.scrollTo(0,0);render();}
function LoanSuccess(){const o=store.ln.accepted;
  const steps=[['Nabídka přijata','Vybral/a jste nabídku od '+o.investor+'.','done'],['Příprava smlouvy','Advokát chystá úvěrovou smlouvu a zástavu.','active'],['Zápis zástavního práva','Návrh na vklad do katastru.','wait'],['Výplata peněz','Po zápisu vám peníze přijdou na účet.','wait'],['Splácení',CZK(o.monthly)+'/měs po dobu '+o.term+' let.','wait'],['Výmaz zástavy','Po doplacení nemovitost zase bez břemen.','wait']];
  return `<div style="max-width:720px;margin:0 auto"><div style="text-align:center"><div class="owl-float" style="display:inline-block">${owl('wow',128)}</div>

#dashWrap .wd-ic{width:34px;height:34px;border-radius:11px;border:none;cursor:pointer;padding:0;background:linear-gradient(145deg,#F8F6F1,#E2DDD3);box-shadow:-3px -3px 6px rgba(255,255,255,.85),3px 3px 8px rgba(120,106,88,.32),inset 0 0 0 1px rgba(255,255,255,.6);display:grid;place-items:center;transition:transform .3s cubic-bezier(.32,.72,0,1),box-shadow .3s}
#dashWrap .wd-ic:hover{transform:translateY(-2px);box-shadow:-4px -4px 9px rgba(255,255,255,.9),5px 6px 13px rgba(120,106,88,.36),inset 0 0 0 1px rgba(255,255,255,.65)}
#dashWrap .wd-ic:active{transform:translateY(0);box-shadow:inset 2px 2px 5px rgba(120,106,88,.32),inset -2px -2px 5px rgba(255,255,255,.85)}
#dashWrap .wd-ic.active{box-shadow:inset 2px 2px 5px rgba(120,106,88,.34),inset -2px -2px 5px rgba(255,255,255,.88),0 0 0 2px rgba(201,168,118,.62)}
#dashWrap .wd-ic svg{width:23px;height:23px;display:block}
#dashWrap .wd-pop{position:fixed;top:84px;right:20px;z-index:60;min-width:228px;max-width:300px;border-radius:22px;padding:22px 22px 20px;border:1px solid rgba(255,255,255,.6);background:linear-gradient(158deg,rgba(255,253,247,.95),rgba(244,236,221,.9));backdrop-filter:blur(40px) saturate(1.6);-webkit-backdrop-filter:blur(40px) saturate(1.6);box-shadow:inset 0 1.6px 0 rgba(255,255,255,.9),0 28px 58px -22px rgba(61,54,46,.5);animation:popOpen .42s cubic-bezier(.32,.72,0,1) both}
@keyframes popOpen{from{opacity:0;transform:translateY(-12px) scale(.96)}to{opacity:1;transform:none}}
#dashWrap .wd-x{position:absolute;top:11px;right:13px;width:24px;height:24px;border:none;border-radius:50%;cursor:pointer;background:rgba(61,54,46,.08);color:var(--ink-60);font-size:11px;line-height:1;display:grid;place-items:center;transition:background .2s}
#dashWrap .wd-x:hover{background:rgba(61,54,46,.18);color:var(--ink)}
#dashWrap .wd-pop .wb-info .wb-big{font-size:27px}
#dashWrap .wd-pop .wb-calc{max-width:none}
#dashWrap .wd-pop .wb-email{flex-direction:column;align-items:flex-start;gap:14px}
@media(max-width:1024px){#dashWrap .wdock{margin-left:4px;padding-left:8px;gap:6px}}
@media(max-width:600px){#dashWrap .wd-pop{right:12px;left:12px;max-width:none;top:auto;bottom:92px}}
/* ===== Programy: flip karty (sklo + info a CTA vzadu) ===== */
#dashWrap .progs{grid-template-columns:repeat(2,1fr);gap:18px}
#dashWrap .prog-c{height:216px;border:none!important;background:transparent!important;padding:0!important;perspective:1300px;cursor:pointer}
#dashWrap .prog-c:hover{transform:none!important}
#dashWrap .pc-in{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.32,.72,0,1)}
#dashWrap .prog-c:hover .pc-in,#dashWrap .prog-c.flip .pc-in{transform:rotateY(180deg)}
#dashWrap .pc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--r);padding:24px;display:flex;flex-direction:column;overflow:hidden;border:1px solid rgba(255,255,255,.62);background:linear-gradient(160deg,rgba(255,253,247,.84),rgba(247,240,225,.76));backdrop-filter:blur(30px) saturate(1.5);-webkit-backdrop-filter:blur(30px) saturate(1.5);box-shadow:inset 0 1.5px 0 rgba(255,255,255,.82),0 18px 40px -22px rgba(61,54,46,.42)}
#dashWrap .pc-front{justify-content:center;align-items:flex-start}
#dashWrap .pc-front .pi{width:54px;height:54px;border-radius:15px;background:rgba(201,168,118,.2);color:var(--gold-d);display:grid;place-items:center;margin-bottom:16px}
#dashWrap .pc-front h4{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:700;color:var(--ink);margin:0}
#dashWrap .pc-more{margin-top:13px;font-size:12.5px;font-weight:600;color:var(--gold-d);display:inline-flex;align-items:center;gap:6px}
#dashWrap .pc-more svg{width:14px;height:14px}
#dashWrap .pc-back{transform:rotateY(180deg);justify-content:center;background:linear-gradient(158deg,rgba(255,253,247,.9),rgba(245,237,222,.85))}
#dashWrap .pc-back h4{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;color:var(--ink);margin:0 0 8px}
#dashWrap .pc-back p{font-size:13.5px;line-height:1.55;color:var(--ink-70);margin:0 0 16px}
#dashWrap .pc-back .btn{align-self:flex-start}
/* ===== Modal: vždy vycentrovaný, vejde se, scroll uvnitř (ne stránky) ===== */
#dashWrap .modal-bg{align-items:center!important;justify-content:center!important;padding:16px!important;overflow:hidden!important}
#dashWrap .modal{max-height:94vh!important;display:flex!important;flex-direction:column!important;overflow:hidden!important;margin:0!important}
#dashWrap .modal-img{flex:0 0 auto}
#dashWrap .modal.modal-xl .modal-img{height:104px!important}
#dashWrap .modal-c{overflow-y:auto;flex:1 1 auto;min-height:0;padding:20px 24px 22px!important}
#dashWrap .modal-c::-webkit-scrollbar{width:8px}
#dashWrap .modal-c::-webkit-scrollbar-thumb{background:rgba(61,54,46,.22);border-radius:8px}
#dashWrap .modal-xl .mgrid{gap:14px!important}
#dashWrap .modal-xl .fin-hero{padding:15px 18px!important}
#dashWrap .modal-xl .dpanel-b{padding:4px 16px 8px!important}
#dashWrap .modal-xl .prow{padding:7px 0!important}
#dashWrap .modal-xl h2{font-size:22px!important;margin-top:6px!important}
#dashWrap .modal-xl .bidbox{margin-top:12px!important;padding:14px 16px!important}
#dashWrap .pcols{display:grid!important;grid-template-columns:1fr 1fr;gap:0 22px}
#dashWrap .modal-xl .dpanel{margin-top:12px!important}
#dashWrap .modal-xl .dpanel-h{padding:11px 16px!important}
#dashWrap .modal-xl .fin-hero .fh-row{margin-bottom:5px!important}
#dashWrap .modal-xl .fin-hero .fh-big{margin-top:6px!important;padding-top:8px!important}
#dashWrap .modal-xl .vfy-banner{padding:12px 14px!important}
#dashWrap .modal-xl .bid-opts{gap:12px!important}
#dashWrap .modal-xl .modal-c>h2{font-size:21px!important}
#dashWrap .modal-xl .modal-c>div:nth-child(2){font-size:13px!important;margin-top:4px!important}
#dashWrap .modal-xl .bid-opts{display:flex!important;flex-direction:column;gap:12px!important}
#dashWrap .modal-xl .blind-note{padding:9px 11px!important;font-size:11.5px!important;margin-top:10px!important}
#dashWrap .modal-xl .bidbox label{margin-bottom:6px!important}
#dashWrap .modal-xl .bid-in{margin-bottom:10px!important}
#dashWrap .modal-xl .dpanel-b.pcols .prow{padding:6px 0!important}
/* ============ v3: jednotný glass + čitelné texty mimo bubliny + modaly všude ============ */
/* — Texty mimo bubliny: adaptivní podle scény (přes video světlé + stín) — */
#dashWrap .app:not(.bg-classic) .dtop h1{background:none!important;-webkit-text-fill-color:#FCF8EF!important;color:#FCF8EF!important;text-shadow:0 2px 18px rgba(0,0,0,.55)}
#dashWrap .app:not(.bg-classic) .greet{color:rgba(255,251,242,.9)!important;text-shadow:0 1px 10px rgba(0,0,0,.5)}
#dashWrap .app:not(.bg-classic) .eyebrow{color:#F1D7A2!important;text-shadow:0 1px 10px rgba(0,0,0,.55)}
#dashWrap .app:not(.bg-classic) .tab{color:rgba(255,251,242,.76)!important;text-shadow:0 1px 8px rgba(0,0,0,.5)}
#dashWrap .app:not(.bg-classic) .tab.active{color:#fff!important;border-color:var(--gold-l)!important}
#dashWrap .app:not(.bg-classic) .tabs{border-bottom-color:rgba(255,255,255,.22)!important}
#dashWrap .app:not(.bg-classic) .search{background:rgba(255,255,255,.15)!important;border-color:rgba(255,255,255,.3)!important;color:rgba(255,251,242,.82)!important}
#dashWrap .app:not(.bg-classic) .search svg{color:rgba(255,251,242,.82)!important}
/* — Jednotný glass (přesně jako nav: blur 40 / saturate 1.7 / brightness 1.05) — */
#dashWrap .dstat,#dashWrap .dpanel,#dashWrap .deal,#dashWrap .dsf-front,#dashWrap .pc-face,#dashWrap .wd-pop,#dashWrap .dsuccess,#dashWrap .dfoot,#dashWrap .modal{backdrop-filter:blur(40px) saturate(1.7) brightness(1.05)!important;-webkit-backdrop-filter:blur(40px) saturate(1.7) brightness(1.05)!important}
#dashWrap .dstat,#dashWrap .dpanel,#dashWrap .deal,#dashWrap .dsf-front,#dashWrap .pc-face,#dashWrap .wd-pop,#dashWrap .dsuccess,#dashWrap .dfoot{background:linear-gradient(158deg,rgba(255,253,247,.82),rgba(247,240,225,.68))!important;border:1px solid rgba(255,255,255,.72)!important;box-shadow:inset 0 1.6px 0 rgba(255,255,255,.92),0 24px 52px -24px rgba(61,54,46,.45)!important}
/* — Modaly: glass + vždy vycentrované + bez useknutí (scroll uvnitř, ne stránky) — */
#dashWrap .modal-bg{align-items:center!important;justify-content:center!important;padding:16px!important;overflow:hidden!important}
#dashWrap .modal{max-height:94vh!important;margin:0!important;background:linear-gradient(158deg,rgba(255,253,247,.93),rgba(247,240,225,.86))!important;border:1px solid rgba(255,255,255,.72)!important}
#dashWrap .modal-xl,#dashWrap .modal-conv{display:flex!important;flex-direction:column!important;overflow:hidden!important}
#dashWrap .modal-xl .modal-c,#dashWrap .modal-conv .modal-c{overflow-y:auto!important;flex:1 1 auto!important;min-height:0!important}
#dashWrap .modal:not(.modal-xl):not(.modal-conv){overflow-y:auto!important}
/* — Accept/conv modal kompaktnější, ať se vejde — */
#dashWrap .conv-top{padding:14px 22px 10px!important}
#dashWrap .conv-top svg{width:54px!important;height:54px!important}
#dashWrap .conv-h{margin-top:5px!important}
#dashWrap .conv-sub{font-size:13px!important;margin-top:5px!important}
#dashWrap .conv-amt{margin:2px 0 4px!important}
#dashWrap .modal-conv .modal-c{padding:6px 22px 20px!important}
#dashWrap .conv-sum{margin:12px 0!important}
#dashWrap .conv-note{padding:10px 12px!important;font-size:11.5px!important}
/* — Tmavé fallback pozadí video scén (než video naběhne, ať světlý text drží) — */
#dashWrap .app.bg-gold::before{background:linear-gradient(158deg,#2C3A3E,#0F1518 72%)!important;opacity:1!important}
#dashWrap .app.bg-cinema::before{background:linear-gradient(158deg,#16232F,#070B11 72%)!important;opacity:1!important}
#dashWrap .app.bg-studio::before{background:linear-gradient(158deg,#3A2C1F,#15100A 72%)!important;opacity:1!important}
#dashWrap .app.bg-loft::before{background:linear-gradient(158deg,#2A2118,#0C0907 72%)!important;opacity:1!important}
/* footer — nelepit na obsah, nepřetékat */
#dashWrap .dgap{flex:1 1 auto;min-height:52px;pointer-events:none}
#dashWrap .dfoot{margin-top:0!important;max-width:var(--maxw);width:100%;margin-left:auto;margin-right:auto;align-items:center}
#dashWrap .dfoot>div:first-child{min-width:0;flex:0 1 auto}
#dashWrap .dfoot>div:first-child>div{min-width:0}
#dashWrap .dfoot .sp-n{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#dashWrap .dfoot .sp-r{font-size:12px;color:var(--ink-60)}
#dashWrap .dfoot .links{margin-left:auto}
/* glass polish hlavních bublin — čistší frosted + výraznější hairline */
#dashWrap .dstat,#dashWrap .dpanel{background:linear-gradient(160deg,rgba(255,253,247,.84),rgba(248,242,230,.77))!important;backdrop-filter:blur(32px) saturate(1.5)!important;-webkit-backdrop-filter:blur(32px) saturate(1.5)!important;border:1px solid rgba(255,255,255,.68)!important;box-shadow:inset 0 1.5px 0 rgba(255,255,255,.82),0 20px 44px -22px rgba(61,54,46,.42)!important}
/* ===== Mobilní responzivita dashboardů ===== */
@media(max-width:780px){
  #dashWrap .snav span{display:none!important}
  #dashWrap .snav{padding:9px 11px!important;gap:0!important}
  #dashWrap .side{max-width:calc(100vw - 18px)!important;gap:3px!important}
  #dashWrap .dmain{margin:4px 14px 0!important}
  #dashWrap .dgrid{grid-template-columns:1fr!important}
  #dashWrap .mgrid{grid-template-columns:1fr!important}
  #dashWrap .dstats{grid-template-columns:1fr!important}
  #dashWrap .deal-grid{grid-template-columns:1fr!important}
  #dashWrap .dtop h1{font-size:22px}
  #dashWrap .dfoot{flex-wrap:wrap;gap:10px;padding:16px}
  #dashWrap .dfoot .links{width:100%}
  #dashWrap .modal-xl,#dashWrap .modal-conv{margin:10px}
}
@media(max-width:480px){
  #dashWrap .scene-sw{left:12px;right:12px;bottom:12px;justify-content:center}
  #dashWrap .clay-big{font-size:32px}
  #dashWrap .dsuccess{padding:30px 20px;border-radius:24px}
}
/* ===== Flip statistiky (vzadu vysvětlení) ===== */
#dashWrap .dstatf{perspective:1100px;cursor:pointer}
#dashWrap .dsf-in{position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.7,.2,1);min-height:122px}
#dashWrap .dstatf:hover .dsf-in,#dashWrap .dstatf.flip .dsf-in{transform:rotateY(180deg)}
#dashWrap .dsf-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;padding:15px 17px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
#dashWrap .dsf-front{background:linear-gradient(160deg,rgba(255,253,247,.86),rgba(248,242,230,.8));backdrop-filter:blur(30px) saturate(1.5);-webkit-backdrop-filter:blur(30px) saturate(1.5);border:1px solid rgba(255,255,255,.72);box-shadow:inset 0 1px 0 rgba(255,255,255,.85),0 12px 28px -16px rgba(61,54,46,.45)}
#dashWrap .dsf-back{transform:rotateY(180deg);background:linear-gradient(155deg,#2A2018,#3B2D21);border:1px solid rgba(201,168,118,.42);box-shadow:0 14px 30px -16px rgba(20,14,8,.6)}
#dashWrap .dsf-back .dl{color:#F0D9A4;font-size:13px;font-weight:700;letter-spacing:.01em;opacity:1;margin-bottom:2px}
#dashWrap .dsf-x{color:rgba(255,247,235,.9);font-size:12.5px;line-height:1.5;margin-top:9px}
#dashWrap .dsf-hint{position:absolute;top:11px;right:13px;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font:700 11px/1 'Bricolage Grotesque',sans-serif;color:var(--ink-50);background:rgba(201,168,118,.16);border:1px solid rgba(201,168,118,.3)}
@media(max-width:560px){#dashWrap .scene-sw{right:12px;bottom:12px;padding:8px 11px;gap:6px}#dashWrap .scene-cap{display:none}#dashWrap .scene-opt{width:20px;height:20px}}
/* ===== NAV — jediný čistý glass bar (přebíjí všechny starší pokusy výše) ===== */
#dashWrap .side,#dashWrap .dmain{position:relative;z-index:2}
#dashWrap .side{align-self:center!important;flex-direction:row!important;align-items:center!important;justify-content:flex-start!important;flex-wrap:nowrap!important;width:fit-content!important;max-width:calc(100vw - 28px)!important;height:auto!important;min-height:0!important;gap:4px!important;padding:7px 9px 7px 7px!important;margin:16px 0 12px!important;border-radius:99px!important;position:sticky!important;top:14px!important;overflow:visible!important;
  background:linear-gradient(160deg,rgba(255,253,247,.72),rgba(247,239,224,.5))!important;backdrop-filter:blur(40px) saturate(1.7) brightness(1.05)!important;-webkit-backdrop-filter:blur(40px) saturate(1.7) brightness(1.05)!important;
  border:1px solid rgba(255,255,255,.72)!important;box-shadow:inset 0 1.6px 0 rgba(255,255,255,.95),inset 0 -1px 0 rgba(201,168,118,.16),0 2px 8px rgba(61,54,46,.05),0 26px 58px -26px rgba(61,54,46,.46)!important}
#dashWrap .side .side-sofi,#dashWrap .side .side-user{display:none!important}
#dashWrap .side-brand{display:flex!important;align-items:center;gap:8px;flex:0 0 auto!important;width:max-content!important;max-width:150px!important;cursor:default;margin:0 4px 0 6px!important;padding:0 14px 0 4px!important;border-right:1px solid rgba(201,168,118,.26)}
#dashWrap .side-brand .owl{width:25px!important;height:27px!important}
#dashWrap .side-brand b{display:inline!important;font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--cocoa)!important}
#dashWrap .side-brand::after{display:none!important}
#dashWrap .navtoggle{display:none!important;width:40px;height:40px;border-radius:50%;place-items:center;background:rgba(61,54,46,.07);border:1px solid var(--rule-s);cursor:pointer;flex:none;position:relative;transition:background .2s}
#dashWrap .navtoggle:hover{background:rgba(201,168,118,.18)}
#dashWrap .navtoggle i{position:absolute;left:50%;top:50%;width:17px;height:2px;background:var(--cocoa);border-radius:2px;transform:translate(-50%,-50%);transition:.3s}
#dashWrap .navtoggle i::before,#dashWrap .navtoggle i::after{content:'';position:absolute;left:0;width:17px;height:2px;background:var(--cocoa);border-radius:2px;transition:.3s}
#dashWrap .navtoggle i::before{top:-6px}#dashWrap .navtoggle i::after{top:6px}
#dashWrap .side.open .navtoggle i{background:transparent}
#dashWrap .side.open .navtoggle i::before{top:0;transform:rotate(45deg)}
#dashWrap .side.open .navtoggle i::after{top:0;transform:rotate(-45deg)}
#dashWrap .snav-wrap{display:flex!important;min-width:0;flex:1 1 auto;justify-content:flex-start}
#dashWrap .snav-inner{display:flex!important;gap:3px;white-space:nowrap}
#dashWrap .snav{display:inline-flex!important;flex-direction:row!important;align-items:center;gap:8px;width:auto;padding:9px 14px!important;margin:0!important;border-radius:99px;font-size:13.5px;font-weight:600;color:var(--ink-70)!important;background:transparent!important;box-shadow:none!important;white-space:nowrap;flex:none;animation:none!important;transition:background .2s,color .2s}
#dashWrap .snav span{display:inline!important}
#dashWrap .snav svg{width:17px;height:17px;color:var(--ink-50)!important;opacity:1}
#dashWrap .snav:hover{background:rgba(201,168,118,.14)!important;color:var(--cocoa)!important}
#dashWrap .snav:hover svg{color:var(--gold-d)!important}
#dashWrap .snav.active{background:linear-gradient(135deg,var(--gold),var(--rust))!important;color:#fff!important;box-shadow:0 7px 16px -7px rgba(181,102,58,.6),inset 0 1px 0 rgba(255,255,255,.32)!important}
#dashWrap .snav.active svg{color:#fff!important;opacity:1}
#dashWrap .dmain{margin:4px clamp(16px,3vw,32px) 0;padding-top:8px}
@media(max-width:1024px){
  #dashWrap .side{flex-wrap:wrap!important;justify-content:space-between!important;padding:8px 12px!important;border-radius:22px!important;gap:6px!important;margin:12px 12px 6px!important;max-width:none!important;width:calc(100vw - 24px)!important}
  #dashWrap .side-brand{border-right:none!important;padding:0 4px!important;margin:0!important}
  #dashWrap .navtoggle{display:grid!important}
  #dashWrap .snav-wrap{display:none!important;width:100%;flex:1 1 100%}
  #dashWrap .side.open .snav-wrap{display:flex!important}
  #dashWrap .snav-inner{flex-wrap:wrap!important;gap:5px;width:100%;justify-content:center;overflow:visible}
  #dashWrap .snav{padding:9px 14px!important;gap:7px!important;animation:navItemIn .35s cubic-bezier(.22,1,.36,1) both!important}
  #dashWrap .snav span{display:inline!important}
}
/* ===== CTA: živé, svítící za buttonem + přejíždějící odlesk ===== */
.btn-primary{position:relative!important;isolation:isolate!important;
  background:linear-gradient(100deg,transparent 38%,rgba(255,255,255,.6) 50%,transparent 60%),linear-gradient(135deg,var(--gold-l) 0%,var(--gold) 48%,var(--rust-l) 130%)!important;
  background-size:260% 100%,100% 100%!important;background-position:210% 0,0 0!important;background-repeat:no-repeat!important;
  color:var(--cocoa-deep)!important;font-weight:700!important;
  box-shadow:0 14px 34px -10px rgba(201,168,118,.85),0 2px 8px -2px rgba(61,54,46,.22),inset 0 1px 0 rgba(255,255,255,.55)!important;
  animation:ctaShine 4.2s cubic-bezier(.5,0,.4,1) infinite!important;
  transition:transform .22s cubic-bezier(.2,.8,.2,1),box-shadow .22s!important}
.btn-primary::before{content:''!important;position:absolute!important;inset:-7px!important;z-index:-1!important;border-radius:inherit!important;pointer-events:none!important;
  background:radial-gradient(60% 130% at 50% 50%,rgba(224,201,151,.95),rgba(208,136,85,.55) 55%,transparent 74%)!important;
  filter:blur(14px)!important;opacity:.5!important;animation:ctaGlow 2.6s ease-in-out infinite!important}
@keyframes ctaShine{0%,22%{background-position:210% 0,0 0}56%,100%{background-position:-160% 0,0 0}}
@keyframes ctaGlow{0%,100%{opacity:.36;transform:scale(.96)}50%{opacity:.82;transform:scale(1.05)}}
.btn-primary:hover{transform:translateY(-2px)!important;box-shadow:0 22px 48px -10px rgba(201,168,118,1),0 5px 14px -2px rgba(61,54,46,.3),inset 0 1px 0 rgba(255,255,255,.7)!important}
.btn-primary:hover::before{opacity:.98!important;animation-duration:1.5s!important}
.btn-primary .arr{background:var(--cocoa-deep)!important;color:var(--gold-l)!important;transition:transform .22s!important}
.btn-primary:hover .arr{transform:translateX(3px) rotate(-3deg)!important}
/* záře i pro velká gold/rust CTA (jen efekt, žádná per-button sova) */
.btn-gold.btn-lg,.btn-pri.btn-lg{position:relative;isolation:isolate;transition:transform .22s cubic-bezier(.2,.8,.2,1),box-shadow .22s}
.btn-gold.btn-lg::before,.btn-pri.btn-lg::before{content:'';position:absolute;inset:-7px;z-index:-1;border-radius:inherit;pointer-events:none;background:radial-gradient(60% 130% at 50% 50%,rgba(224,201,151,.9),rgba(208,136,85,.5) 55%,transparent 74%);filter:blur(14px);opacity:.42;animation:ctaGlow 2.8s ease-in-out infinite}

    c.addEventListener('click',function(e){if(e.target.closest('.cta'))return;if(moved){moved=false;return;}var i=+c.dataset.i;if(Math.round(pos)!==i){go(i);return;}if(matchMedia('(hover:hover)').matches)return;
      if(cv){var sc=cv.querySelector('source');openFs(sc?sc.src:(cv.currentSrc||cv.src));}
      else{c.classList.toggle('flip');}
    });
  });
  pills.forEach(function(p){p.addEventListener('click',function(){go(+p.dataset.i);});});
  if(arrL)arrL.addEventListener('click',function(){go(Math.round(pos)-1);});
  if(arrR)arrR.addEventListener('click',function(){go(Math.round(pos)+1);});
  addEventListener('resize',function(){if(document.body.contains(root))measure();});
  addEventListener('keydown',function(e){if(!document.body.contains(root)||!stage.classList.contains('show'))return;if(e.key==='ArrowLeft')go(Math.round(pos)-1);if(e.key==='ArrowRight')go(Math.round(pos)+1);});
  measure();
  requestAnimationFrame(function(){if(convo)convo.classList.add('show');stage.classList.add('show');var pl=root.querySelector('.pills');if(pl)pl.classList.add('show');dealIn();});
};

document.addEventListener('click',function(e){var s=e.target.closest('#dashWrap .dstatf');if(s&&matchMedia('(hover:none)').matches){s.classList.toggle('flip');}});
document.addEventListener('mouseover',function(e){var c=e.target.closest('.ts-card');if(c){var v=c.querySelector('.ts-vid');if(v){var p=v.play&&v.play();if(p&&p.catch)p.catch(function(){});}}});
document.addEventListener('mouseout',function(e){var c=e.target.closest('.ts-card');if(c&&!c.contains(e.relatedTarget)){var v=c.querySelector('.ts-vid');if(v){try{v.pause();}catch(_){}}}});
document.addEventListener('click',function(e){var c=e.target.closest('.ts-card');if(c&&matchMedia('(hover:none)').matches){c.classList.toggle('flip');var v=c.querySelector('.ts-vid');if(v){if(c.classList.contains('flip')){var p=v.play&&v.play();if(p&&p.catch)p.catch(function(){});}else{try{v.pause();}catch(_){}}}}});
