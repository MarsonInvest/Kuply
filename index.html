<style>
:root{
  --paper:#FBF7EE;
  --paper-2:#F3EBD7;
  --paper-3:#E9DDC2;
  --ivory:#FFFCF4;
  --clay:#E8DCC0;
  --champagne:#DCC9A0;
  --gold:#C9A876;
  --gold-l:#E0C997;
  --gold-d:#8E7340;
  --gold-deep:#6B5530;
  --rust-l:#D08855;
  --rust:#B5663A;
  --rust-d:#8A4925;
  --cocoa:#3D362E;
  --cocoa-2:#4A3F33;
  --cocoa-3:#5C4D3E;
  --cocoa-deep:#2F2620;
  --ink:#3D362E;
  --ink-90:rgba(61,54,46,.92);
  --ink-75:rgba(61,54,46,.75);
  --ink-60:rgba(61,54,46,.60);
  --ink-45:rgba(61,54,46,.45);
  --ink-30:rgba(61,54,46,.30);
  --rule:rgba(61,54,46,.07);
  --rule-s:rgba(61,54,46,.14);
  --positive:#6B8A56;
  --g-rust:linear-gradient(135deg,#D58E64 0%,#C97D52 50%,#A0532D 100%);
  --g-gold:linear-gradient(135deg,#E0C997 0%,#C9A876 50%,#A0824F 100%);
  --g-cocoa:linear-gradient(135deg,#5C4D3E 0%,#3D362E 50%,#2F2620 100%);
  --g-cocoa-warm:linear-gradient(135deg,#5C4D3E 0%,#3D362E 60%,#1F1A14 100%);
  --g-sofi:radial-gradient(circle at 30% 30%,#E0C997 0%,#A0824F 50%,#5C3E1F 100%);
  --g-paper:linear-gradient(180deg,#FBF7EE 0%,#F6EFE0 100%);
  --sh-sm:0 1px 2px rgba(61,54,46,.04),0 4px 12px -4px rgba(61,54,46,.06);
  --sh-md:0 1px 3px rgba(61,54,46,.04),0 16px 40px -12px rgba(61,54,46,.10);
  --sh-lg:0 1px 3px rgba(61,54,46,.04),0 32px 80px -16px rgba(61,54,46,.12);
  --sh-xl:0 1px 3px rgba(61,54,46,.04),0 40px 100px -24px rgba(61,54,46,.18);
}
*{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
html{scroll-behavior:smooth}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  line-height:1.55;
  margin:0;
  font-weight:400;
  background-image:
    radial-gradient(ellipse 1200px 600px at 80% -10%, rgba(201,168,118,.14), transparent 60%),
    radial-gradient(ellipse 1000px 500px at -10% 30%, rgba(201,125,82,.07), transparent 60%);
  background-attachment:fixed;
  background-repeat:no-repeat;
}

.display{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;letter-spacing:-.042em;line-height:1.02;color:var(--ink)}
.display-bold{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;letter-spacing:-.052em;line-height:1.16;color:var(--ink)}
.display-tight{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;letter-spacing:-.045em;line-height:1.16;color:var(--ink)}
.mono{font-family:'JetBrains Mono',monospace;font-feature-settings:"tnum" 1, "ss01" 1}
.serif-it{font-family:'Bricolage Grotesque',sans-serif;font-style:italic;font-weight:500}

.t-soft{color:var(--ink-75)}
.t-mute{color:var(--ink-60)}
.t-faint{color:var(--ink-45)}
.gt-rust{background:var(--g-rust);-webkit-background-clip:text;background-clip:text;color:transparent}
.gt-gold{background:var(--g-gold);-webkit-background-clip:text;background-clip:text;color:transparent}

.mk{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;font-weight:600;color:var(--ink-60)}
.mk-rust{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;font-weight:600;color:var(--rust)}
.mk-gold{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;font-weight:600;color:var(--gold-d)}

/* GLASS */
.glass{
  background:linear-gradient(135deg,rgba(255,253,247,.6),rgba(255,250,240,.32));
  backdrop-filter:blur(44px) saturate(185%) brightness(1.04);
  -webkit-backdrop-filter:blur(44px) saturate(185%) brightness(1.04);
  border:1px solid rgba(255,253,247,.55);
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,.92),
    inset 0 0 0 1px rgba(255,253,247,.16),
    inset 0 -22px 50px -30px rgba(201,168,118,.22),
    0 2px 6px rgba(61,54,46,.04),
    0 20px 48px -16px rgba(61,54,46,.13),
    0 60px 120px -50px rgba(61,54,46,.18);
}
.glass-cocoa{
  background:var(--g-cocoa);
  border:1px solid rgba(201,168,118,.2);
  box-shadow:
    inset 0 1.5px 0 rgba(224,201,151,.2),
    inset 0 0 34px -12px rgba(201,168,118,.14),
    inset 0 -1px 0 rgba(0,0,0,.32),
    0 30px 72px -18px rgba(31,26,20,.46),
    0 12px 30px -10px rgba(31,26,20,.26);
}

/* SOFI ORB */
.sofi-orb{position:relative;display:inline-block;border-radius:50%}
.sofi-orb-bg{position:absolute;inset:0;border-radius:50%;background:var(--g-sofi);box-shadow:0 20px 60px -10px rgba(61,54,46,.35),inset 0 4px 20px rgba(255,253,247,.35),inset 0 -8px 24px rgba(61,54,46,.35)}
.sofi-orb-shimmer{position:absolute;top:8%;left:15%;width:35%;height:30%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,253,247,.7),transparent 70%);filter:blur(4px)}
.sofi-orb-ring{position:absolute;inset:-8px;border-radius:50%;border:1.5px solid rgba(224,201,151,.5);border-top-color:rgba(224,201,151,.95);border-right-color:rgba(224,201,151,.7)}
.sofi-orb-glow{position:absolute;inset:-40%;border-radius:50%;background:radial-gradient(circle,rgba(224,201,151,.55) 0%,rgba(201,168,118,.18) 40%,transparent 70%);filter:blur(24px);z-index:-1}
.sofi-orb-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 4px 8px rgba(61,54,46,.25))}

.glow{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px)}
.glow-g{background:radial-gradient(circle,rgba(201,168,118,.42),transparent 65%)}
.glow-r{background:radial-gradient(circle,rgba(201,125,82,.30),transparent 65%)}

@keyframes spin-slow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin-slow{animation:spin-slow 28s linear infinite}
@keyframes glowP{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.85;transform:scale(1.10)}}
.glow-pulse{animation:glowP 5s ease-in-out infinite}
@keyframes liveBlink{0%,100%{opacity:1}50%{opacity:.4}}
.live{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;font-weight:600}
.live::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;animation:liveBlink 1.4s ease-in-out infinite}

@keyframes softFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes softFadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes softScale{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes softBlur{from{opacity:0;filter:blur(8px)}to{opacity:1;filter:blur(0)}}
.m-fade{animation:softFade .5s cubic-bezier(.2,.8,.2,1) both}
.m-fade-up{animation:softFadeUp .7s cubic-bezier(.2,.8,.2,1) both}
.m-scale{animation:softScale .4s cubic-bezier(.2,.8,.2,1) both}
.m-blur{animation:softBlur .8s cubic-bezier(.2,.8,.2,1) both}

@keyframes radarPulse{0%{transform:scale(.4);opacity:.7}100%{transform:scale(1);opacity:0}}
.radar-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--gold);animation:radarPulse 2.2s ease-out infinite}
.radar-ring-2{animation-delay:.7s}
.radar-ring-3{animation-delay:1.4s}

@keyframes valuePulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
.value-pulse{animation:valuePulse .6s ease-out}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 22px 14px 26px;border-radius:99px;font-weight:600;font-size:15px;cursor:pointer;transition:all .3s cubic-bezier(.2,.8,.2,1);border:none;font-family:inherit;letter-spacing:-.005em;line-height:1}
.btn-primary{background:var(--cocoa);color:var(--ivory);box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 6px 20px -4px rgba(61,54,46,.30)}
.btn-primary:hover{background:var(--cocoa-deep);transform:translateY(-1px);box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 10px 28px -4px rgba(61,54,46,.40)}
.btn-primary .arr{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:rgba(255,252,244,.14);transition:all .3s}
.btn-primary:hover .arr{background:rgba(255,252,244,.22);transform:translateX(2px)}
.btn-soft{background:rgba(255,252,244,.85);color:var(--ink);border:1px solid rgba(232,220,192,.7);padding:14px 22px}
.btn-soft:hover{background:#fff;border-color:var(--cocoa);transform:translateY(-1px);box-shadow:var(--sh-md)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--rule-s);padding:12px 20px;font-size:14px}
.btn-ghost:hover{border-color:var(--ink);background:rgba(61,54,46,.03)}
.btn-text{background:transparent;color:var(--ink);padding:8px 12px;font-size:13px;font-weight:500;border:none}
.btn-text:hover{color:var(--rust)}

/* CHIPS */
.chip{padding:13px 22px;border-radius:99px;background:rgba(255,252,244,.85);border:1.5px solid rgba(232,220,192,.7);color:var(--ink);font-size:15px;font-weight:500;cursor:pointer;transition:all .25s cubic-bezier(.2,.8,.2,1);font-family:inherit;display:inline-flex;align-items:center;gap:8px;line-height:1;letter-spacing:-.005em}
.chip:hover{background:#fff;border-color:var(--cocoa);transform:translateY(-1px);box-shadow:0 6px 20px -6px rgba(61,54,46,.12)}
.chip.picked{background:var(--cocoa);color:var(--ivory);border-color:var(--cocoa);box-shadow:0 4px 16px -4px rgba(61,54,46,.25)}
.chip-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;opacity:.8}
.chip.picked .chip-dot{background:var(--gold-l)}

/* FORM */
.field-label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;letter-spacing:-.005em}
.field-input{width:100%;padding:16px 18px;border-radius:14px;border:1.5px solid rgba(232,220,192,.7);background:rgba(255,252,244,.85);color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;font-weight:500;transition:all .25s;outline:none;letter-spacing:-.005em}
.field-input:focus{border-color:var(--cocoa);background:#fff;box-shadow:0 0 0 4px rgba(61,54,46,.06)}
.field-input::placeholder{color:var(--ink-45);font-weight:400}
.field-helper{font-size:13px;color:var(--ink-60);margin-top:8px;line-height:1.5}

.option-card{padding:16px 18px;border-radius:14px;background:rgba(255,252,244,.85);border:1.5px solid rgba(232,220,192,.7);color:var(--ink);font-size:15px;font-weight:500;cursor:pointer;transition:all .25s;font-family:inherit;display:flex;justify-content:space-between;align-items:center;gap:12px;width:100%;text-align:left;letter-spacing:-.005em}
.option-card:hover{background:#fff;border-color:var(--cocoa)}
.option-card.picked{background:var(--cocoa);color:var(--ivory);border-color:var(--cocoa)}

/* FAQ */
.faq-item{background:rgba(255,252,244,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px;border:1px solid rgba(232,220,192,.45);overflow:hidden;transition:all .35s cubic-bezier(.2,.8,.2,1)}
.faq-item.open{box-shadow:var(--sh-md);background:rgba(255,252,244,.92);border-color:rgba(201,168,118,.4)}
.faq-q{padding:22px 26px;font-weight:600;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:16px;gap:16px;color:var(--ink);letter-spacing:-.005em}
.faq-icon{width:28px;height:28px;border-radius:50%;background:rgba(232,220,192,.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;font-weight:600;color:var(--cocoa);font-size:16px}
.faq-item.open .faq-icon{background:var(--cocoa);color:var(--ivory);transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.2,.8,.2,1);padding:0 26px}
.faq-item.open .faq-a{max-height:600px;padding:0 26px 22px}

.loading-bar{height:3px;background:rgba(61,54,46,.06);border-radius:99px;overflow:hidden;position:relative}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.loading-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--gold),transparent);background-size:200% 100%;animation:shimmer 1.8s linear infinite}

/* DUAL ENTRY CARDS — the new hero */
.entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media (max-width:880px){.entry-grid{grid-template-columns:1fr}}

.entry-card{position:relative;border-radius:28px;padding:36px;cursor:pointer;transition:all .4s cubic-bezier(.2,.8,.2,1);overflow:hidden;display:flex;flex-direction:column;min-height:340px}
.entry-card.light{
  background:linear-gradient(135deg,rgba(255,252,244,.85),rgba(255,252,244,.50));
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1px solid rgba(255,252,244,.85);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.85),
    inset 0 -1px 0 rgba(61,54,46,.04),
    0 1px 3px rgba(61,54,46,.03),
    0 12px 32px -8px rgba(61,54,46,.06),
    0 40px 80px -24px rgba(61,54,46,.10);
}
.entry-card.light:hover{
  transform:translateY(-3px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.85),
    0 16px 40px -8px rgba(61,54,46,.10),
    0 50px 100px -24px rgba(61,54,46,.16);
  border-color:rgba(201,168,118,.5);
}
.entry-card.dark{
  background:var(--g-cocoa);
  color:var(--ivory);
  border:1px solid rgba(201,168,118,.22);
  box-shadow:
    inset 0 1px 0 rgba(201,168,118,.18),
    inset 0 -1px 0 rgba(0,0,0,.3),
    0 24px 60px -16px rgba(61,54,46,.35),
    0 12px 24px -8px rgba(61,54,46,.2);
}
.entry-card.dark:hover{
  transform:translateY(-3px);
  box-shadow:
    inset 0 1px 0 rgba(201,168,118,.18),
    0 32px 70px -16px rgba(61,54,46,.45),
    0 16px 32px -8px rgba(61,54,46,.25);
}
.entry-card-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;margin-bottom:24px}
.entry-card .arrow-corner{position:absolute;top:32px;right:32px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s}
.entry-card.light .arrow-corner{background:rgba(61,54,46,.06);color:var(--ink)}
.entry-card:hover.light .arrow-corner{background:var(--cocoa);color:var(--ivory);transform:rotate(-45deg)}
.entry-card.dark .arrow-corner{background:rgba(255,252,244,.10);color:var(--ivory)}
.entry-card:hover.dark .arrow-corner{background:var(--gold);color:var(--cocoa);transform:rotate(-45deg)}

/* SUGGESTIONS */
.suggestions{position:absolute;left:0;right:0;top:100%;margin-top:8px;background:#fff;border-radius:16px;overflow:hidden;border:1px solid var(--rule-s);box-shadow:0 16px 48px -8px rgba(61,54,46,.18);z-index:20;max-height:280px;overflow-y:auto}
.suggestion-item{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s;border-bottom:1px solid var(--rule);text-align:left;width:100%;background:transparent;border:none;font-family:inherit}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:hover{background:rgba(232,220,192,.3)}

/* FLOATING SOFI */
.floating-sofi{position:fixed;bottom:24px;right:24px;z-index:60}
.floating-sofi-btn{display:flex;align-items:center;gap:12px;padding:10px 20px 10px 12px;border-radius:99px;background:rgba(255,252,244,.85);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border:1px solid rgba(232,220,192,.6);box-shadow:0 1px 0 rgba(255,255,255,.7) inset,0 12px 32px -8px rgba(61,54,46,.20);cursor:pointer;transition:all .3s;font-family:inherit;color:var(--ink);font-size:14px;font-weight:500}
.floating-sofi-btn:hover{transform:translateY(-2px);box-shadow:0 1px 0 rgba(255,255,255,.7) inset,0 16px 48px -8px rgba(61,54,46,.25)}
.floating-sofi-orb-mini{position:relative;width:36px;height:36px;border-radius:50%;background:var(--g-sofi);box-shadow:0 4px 12px -2px rgba(61,54,46,.3),inset 0 2px 8px rgba(255,253,247,.4),inset 0 -3px 10px rgba(61,54,46,.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.floating-sofi-orb-mini::before{content:'';position:absolute;top:8%;left:15%;width:35%;height:30%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,253,247,.7),transparent 70%);filter:blur(2px)}
.floating-sofi-panel{position:fixed;bottom:90px;right:24px;width:380px;max-width:calc(100vw - 48px);max-height:560px;background:rgba(255,252,244,.95);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:1px solid rgba(232,220,192,.7);border-radius:24px;box-shadow:0 24px 80px -16px rgba(61,54,46,.30);z-index:60;display:flex;flex-direction:column;overflow:hidden}
@media (max-width:640px){
  .floating-sofi{bottom:16px;right:16px}
  .floating-sofi-panel{bottom:80px;right:16px;left:16px;width:auto}
}

/* Step progress dot bar */
.step-bar{display:flex;gap:6px;align-items:center}
.step-dot{height:4px;border-radius:99px;transition:all .5s cubic-bezier(.2,.8,.2,1)}

/* Range bar visualization for quick estimate */
.range-track{position:relative;height:8px;background:rgba(61,54,46,.06);border-radius:99px;overflow:hidden}
.range-fill{position:absolute;top:0;bottom:0;background:var(--g-gold);border-radius:99px}
@keyframes growRange{from{width:0!important}to{}}

.num-flex{display:flex;align-items:baseline;justify-content:flex-start;gap:6px}

::selection{background:var(--gold);color:var(--cocoa)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--rule-s);border-radius:4px}

/* 3D CAROUSEL STEP SWAP + LIQUID GLASS PANEL */
.flow-panel{perspective:1400px;position:relative;
  background:linear-gradient(150deg,rgba(255,252,244,.93),rgba(255,252,244,.74)) !important;
  backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid rgba(255,253,247,.55) !important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.95),inset 1px 0 0 rgba(255,255,255,.45),inset -1px 0 0 rgba(255,255,255,.30),0 36px 90px -24px rgba(32,25,19,.55),0 0 120px -10px rgba(224,201,151,.32) !important}
.flow-panel::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(115deg,transparent 32%,rgba(255,255,255,.20) 46%,rgba(255,255,255,.05) 54%,transparent 64%);background-size:240% 100%;animation:sheenMove 8s ease-in-out infinite}
@keyframes sheenMove{0%,45%{background-position:150% 0}100%{background-position:-70% 0}}
.flow-panel .m-fade,.flow-panel .m-fade-up{animation:carouselIn .72s cubic-bezier(.22,.9,.24,1) both;transform-origin:12% 50%}
@keyframes carouselIn{0%{opacity:0;transform:rotateY(-58deg) translateZ(-110px) translateX(46px) scale(.97);filter:blur(9px)}55%{opacity:1;filter:blur(0)}100%{opacity:1;transform:none;filter:none}}
#cycleWord{display:inline-block;white-space:nowrap}
.cyc-out{animation:cycOut .3s cubic-bezier(.5,0,1,1) both}
.cyc-in{animation:cycIn .42s cubic-bezier(.2,.8,.2,1) both}
@keyframes cycOut{to{opacity:0;transform:translateY(16px);filter:blur(8px)}}
@keyframes cycIn{from{opacity:0;transform:translateY(-16px);filter:blur(8px)}to{opacity:1;transform:none;filter:none}}
@media (prefers-reduced-motion: reduce){.flow-panel .m-fade,.flow-panel .m-fade-up{animation:softFade .3s both}.flow-panel::after{animation:none}}

/* ATMOSPHERIC STAGE — the floating console (IT-EMPIRE deck feel, warm) */
.flow-section{transition:background .7s ease}
.stage-on{
  background:
    radial-gradient(1100px 620px at 50% -12%, rgba(208,136,85,.30), transparent 62%),
    radial-gradient(760px 540px at 14% 116%, rgba(201,168,118,.22), transparent 60%),
    linear-gradient(180deg,#201913 0%,#2B231C 46%,#372C23 100%);
}
.stage-on::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 100% at 50% 26%,transparent 46%,rgba(61,54,46,.045) 100%);opacity:1;pointer-events:none;z-index:0}
.stage-on .glow-g{opacity:.95}
.stage-on .flow-trust{color:rgba(255,253,247,.55)!important}
.console-wrap{position:relative;max-width:912px;margin:0 auto;padding:18px}
.console-wrap::before{content:"";position:absolute;inset:-46px;border-radius:48px;background:radial-gradient(ellipse at 50% 38%,rgba(224,201,151,.30),rgba(224,201,151,.10) 45%,transparent 75%);z-index:0;pointer-events:none}
.console-wrap .flow-panel{position:relative;z-index:2;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.9),
    0 0 0 1px rgba(224,201,151,.22),
    0 30px 70px -30px rgba(61,54,46,.30),
    0 0 120px -24px rgba(224,201,151,.26);
}
.console-tag{position:absolute;top:-9px;left:50%;transform:translateX(-50%);z-index:4;font-size:9px;letter-spacing:.28em;color:rgba(224,201,151,.92);background:rgba(32,25,19,.9);border:1px solid rgba(224,201,151,.32);padding:5px 14px;border-radius:99px;white-space:nowrap}
.ck{position:absolute;width:28px;height:28px;border:2px solid rgba(224,201,151,.7);z-index:3;pointer-events:none}
.ck-tl{top:2px;left:2px;border-right:0;border-bottom:0;border-top-left-radius:8px}
.ck-tr{top:2px;right:2px;border-left:0;border-bottom:0;border-top-right-radius:8px}
.ck-bl{bottom:2px;left:2px;border-right:0;border-top:0;border-bottom-left-radius:8px}
.ck-br{bottom:2px;right:2px;border-left:0;border-top:0;border-bottom-right-radius:8px}
@media (max-width:560px){.console-wrap{padding:12px}.ck{width:18px;height:18px}.console-wrap .flow-panel{padding:24px 18px 26px!important}}

.cine-top{width:46px;height:46px;border-radius:50%;border:1px solid rgba(224,201,151,.3);
  background:rgba(255,253,247,.05);color:var(--gold-l);font-size:18px;cursor:pointer;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);will-change:transform;
  transition:border-color var(--dur-2) var(--ease)}
.cine-top:hover{border-color:var(--gold-l)}
@media(max-width:640px){
  .cine-spacer,.cine-footer{height:92vh}
  .cine-giant{font-size:34vw;bottom:-2vh}
  .cine-marquee{top:6%}
  .cine-bottom{flex-wrap:wrap;justify-content:center;margin-top:5vh}
}
@media(prefers-reduced-motion:reduce){
  .cine-track,.cine-aurora,.cine-heart{animation:none}
  .cine-giant{transform:translate3d(-50%,0,0)}
}
</style>
<style>/* ============================================================
   KUPLY OS · P3 WOW mikrovzory (adaptace: AnimateNumber,
   word-appear reveal, card sheen) — transform/opacity/malé blury
   ============================================================ */
/* word-appear: H1 slova se vynořují z bluru */
.wa{display:inline-block;opacity:0;filter:blur(12px);transform:translate3d(0,22px,0);
  animation:waIn .6s var(--ease-in) forwards;animation-delay:var(--d,0s);
  will-change:transform,opacity,filter}
@keyframes waIn{to{opacity:1;filter:blur(0);transform:translate3d(0,0,0)}}
/* digit ticker: mění se jen změněné číslice (slide+blur) */
.kn{display:inline-flex;font-variant-numeric:tabular-nums}
.kn-slot{position:relative;display:inline-block}
.kn-l{display:inline-block;will-change:transform,opacity,filter}
.kn-out{position:absolute;inset:0;animation:knOut .5s cubic-bezier(.4,0,1,1) both}
.kn-in{animation:knIn .5s var(--ease-in) both}
@keyframes knIn{from{transform:translateY(.55em);opacity:0;filter:blur(6px)}
  to{transform:translateY(0);opacity:1;filter:blur(0)}}
@keyframes knOut{from{transform:translateY(0);opacity:1;filter:blur(0)}
  to{transform:translateY(-.55em);opacity:0;filter:blur(6px)}}
.lc-live b{color:var(--ink);font-weight:700}
/* sheen: světlo sleduje kurzor na tmavé kartě */
.lc-card.dark{--mx:50%;--my:38%}
.lc-card.dark .lc-sheen{position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:radial-gradient(420px circle at var(--mx) var(--my),rgba(255,236,200,.11),transparent 46%)}
@media(prefers-reduced-motion:reduce){
  .wa{animation-duration:.01s;animation-delay:0s}
  .kn-out{display:none}
}
</style>
<style>/* ============================================================
   KUPLY OS · P4 — sova v orbu · SpecForm · proces karusel ·
   FOMO · sticky příběhy · footer glow
   ============================================================ */
/* ---- sova zpět (jako v dashboardech) ---- */
.sf-owl{position:absolute;left:50%;top:51%;width:86%;height:86%;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 2px 4px rgba(47,38,32,.4))}
.sf-eye{display:none !important}
.sf-mount.is-thinking .sf-owl{animation:sfOwlBob 1.4s var(--ease) infinite}
@keyframes sfOwlBob{
  0%,100%{transform:translate(-50%,-53%) scale(1)}
  50%{transform:translate(-50%,-49%) scale(1.05)}}

/* ---- SpecForm ---- */
.spec-meter{text-align:right;min-width:150px}
.spec-pct{font-size:30px;font-weight:700;color:var(--gold-d);line-height:1}
.spec-pct span{font-size:15px;opacity:.7}
.spec-bar{height:5px;border-radius:99px;background:rgba(61,54,46,.12);margin:7px 0 5px;overflow:hidden}
.spec-bar i{display:block;height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));
  transition:width .45s var(--ease)}
.spec-note{font-size:8.5px;letter-spacing:.22em;color:var(--ink-45)}
.spec-grid{display:flex;flex-direction:column;gap:20px}
.spec-label{font-size:10px;letter-spacing:.18em;color:var(--ink-60);margin-bottom:9px;text-transform:uppercase}
.spec-req{color:var(--rust);font-size:9px}
.spec-chips{display:flex;flex-wrap:wrap;gap:8px}
.sp-chip{padding:9px 15px;border-radius:99px;font-family:inherit;font-size:13.5px;font-weight:500;
  border:1px solid rgba(61,54,46,.18);background:rgba(255,252,244,.8);color:var(--ink-75);cursor:pointer;
  transition:all var(--dur-2) var(--ease)}
.sp-chip:hover{border-color:var(--gold);transform:translateY(-1px)}
.sp-chip.on{background:var(--cocoa);color:var(--ivory);border-color:var(--cocoa)}

/* ---- proces karusel (menší tmavé karty) ---- */
.lc-wrap.proc{margin-top:46px}
.lc-wrap.proc .lc-stage{height:392px}
.lc-wrap.proc .lc-card{
  width:min(430px,86vw);margin-left:calc(min(430px,86vw)/-2);
  min-height:282px;padding:26px 28px 22px;
  background:linear-gradient(160deg,rgba(47,38,30,.96),rgba(32,25,19,.94));
  border:1px solid rgba(224,201,151,.26);color:var(--ivory);
  box-shadow:inset 0 1px 0 rgba(224,201,151,.3)}
.pc-n{display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:12px;font-size:14px;font-weight:700;
  color:#2A211A;background:linear-gradient(135deg,var(--gold-l),var(--gold));
  box-shadow:0 6px 16px -5px rgba(201,168,118,.6)}
.pc-sofi{margin-top:auto;display:flex;gap:10px;align-items:flex-start;
  background:rgba(224,201,151,.10);border-left:3px solid var(--gold);
  border-radius:10px;padding:10px 12px}
.pc-sofi p{font-size:13px;font-style:italic;color:rgba(255,253,247,.85);margin:0;line-height:1.45}
@media(max-width:560px){.lc-wrap.proc .lc-stage{height:420px}.lc-wrap.proc .lc-card{min-height:350px}}

/* ---- FOMO teaser ---- */
.fomo{max-width:1060px;margin:64px auto 0;padding-top:46px;border-top:1px solid var(--rule)}
.fomo-head{text-align:center;font-size:10px;letter-spacing:.3em;color:var(--gold-d);margin-bottom:22px}
.fomo-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.fomo-card{flex:1;min-width:240px;max-width:330px;padding:20px 22px;border-radius:18px;
  background:rgba(255,252,244,.82);border:1px solid var(--rule);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 10px 26px -14px rgba(47,38,32,.3)}
.fomo-loc{font-size:9.5px;letter-spacing:.2em;color:var(--ink-45);margin-bottom:7px}
.fomo-t{font-weight:600;color:var(--ink);margin-bottom:12px}
.fomo-price{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.fomo-blur{filter:blur(5px);user-select:none;font-weight:700;font-size:18px;color:var(--ink);letter-spacing:.02em}
.fomo-y{font-size:10.5px;letter-spacing:.1em;color:var(--gold-d);font-weight:600}
.fomo-lock{margin-top:11px;display:flex;align-items:center;gap:6px;font-size:8.5px;letter-spacing:.18em;color:var(--ink-45)}

/* ---- Příběhy: sticky card-stack (adaptace CardsStack) ---- */
.story-stack{max-width:740px;margin:0 auto;display:flex;flex-direction:column}
.story-card{position:sticky;border-radius:22px;padding:30px 32px;margin-bottom:28px;
  background:linear-gradient(165deg,#FFFDF6,#F6EEDD);
  border:1px solid var(--rule);
  box-shadow:0 -14px 36px -20px rgba(47,38,32,.4),0 4px 12px -6px rgba(47,38,32,.14),
    inset 0 1px 0 rgba(255,255,255,.95)}
@media(max-width:560px){.story-card{padding:22px 20px}}

/* ---- live ticker výrazněji ---- */
.lc-live .kn{font-size:16px;color:var(--gold-d);font-weight:700;letter-spacing:0;margin-right:2px}

/* ---- footer glow titulku (adaptace Illuminated) ---- */
.cine-h{text-shadow:0 0 22px rgba(224,201,151,.30),0 0 70px rgba(224,201,151,.18),0 3px 6px rgba(0,0,0,.45)}

@media(prefers-reduced-motion:reduce){
  .sf-mount.is-thinking .sf-owl{animation:none}
}
/* mobil: boční slivery = tmavé sklo, žádná čitelná useknutá písmena */
@media(max-width:560px){
  .lc-veil{background:linear-gradient(115deg,rgba(32,25,19,.55),rgba(32,25,19,.92))}
}

/* ---- Trust sekce (právníci + banka) ---- */
.trust-card{padding:28px 26px;border-radius:22px;
  background:linear-gradient(165deg,rgba(255,253,246,.95),rgba(245,237,218,.78));
  border:1px solid rgba(201,168,118,.25);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 8px 22px -14px rgba(47,38,32,.28);
  display:flex;flex-direction:column;gap:10px}
.trust-icon{font-size:28px;line-height:1;margin-bottom:4px}
.trust-label{font-size:9.5px;letter-spacing:.22em;color:var(--gold-d);margin-bottom:2px;text-transform:uppercase}
.trust-title{font-size:20px;font-weight:700;color:var(--ink);line-height:1.2}
.trust-body{font-size:14.5px;line-height:1.6;color:var(--ink-75);flex:1}
.trust-badge{display:inline-flex;align-items:center;padding:6px 14px;border-radius:99px;
  background:rgba(61,54,46,.07);border:1px solid rgba(61,54,46,.12);
  font-size:11px;font-weight:600;color:var(--ink-60);letter-spacing:.04em;
  margin-top:4px;width:fit-content}

.no-wa .wa,.no-wa.wa{animation:none!important;opacity:1!important;filter:none!important;transform:none!important}
</style>
<style>/* ============================================================
   KUPLY OS · P5 — 3D tilt pohledy · FAQ wow · globální grain
   ============================================================ */
/* ---- globální filmový grain (jen landing, řídí JS) ---- */
/* grain jen na hero pozadí — viz .flow-section::before v p2_fx.css */
#grainFx{display:none!important}  /* deprecated: nahrazen lokálním grainem v hero */
/* .flow-section::after grain povolen — spravuje p2_fx.css */

/* ---- tři pohledy: 3D tilt karty ---- */
.tilt-row{perspective:1100px}
.tilt-row>div{position:relative;transform-style:preserve-3d;will-change:transform;
  transition:box-shadow .35s var(--ease)}
.tilt-row>div.tilt-on{transition:none}
.tilt-row>div:hover{box-shadow:0 26px 50px -18px rgba(47,38,32,.38),0 8px 18px -8px rgba(47,38,32,.2),
  inset 0 1px 0 rgba(255,255,255,.95)}
.tilt-glare{position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:0;
  background:radial-gradient(320px circle at var(--gx,50%) var(--gy,30%),rgba(255,244,214,.35),transparent 55%);
  transition:opacity .3s var(--ease)}
.tilt-row>div:hover .tilt-glare{opacity:1}
/* vstupní reveal */
.tilt-row>div{opacity:0;transform:translateY(26px)}
.tilt-row.tin>div{opacity:1;transform:translateY(0);
  transition:opacity .7s var(--ease-in),transform .7s var(--ease-in)}
.tilt-row.tin>div:nth-child(2){transition-delay:.12s}
.tilt-row.tin>div:nth-child(3){transition-delay:.24s}

/* ---- FAQ wow ---- */
.faq-item.fx{border:1px solid var(--rule);border-radius:18px;margin-bottom:0;
  background:linear-gradient(165deg,rgba(255,253,246,.92),rgba(247,240,223,.78));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 6px 18px -12px rgba(47,38,32,.25);
  overflow:hidden;transition:border-color var(--dur-2) var(--ease),transform var(--dur-2) var(--ease),
    box-shadow var(--dur-2) var(--ease)}
.faq-item.fx:hover{border-color:rgba(201,168,118,.6);transform:translateY(-2px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 14px 30px -14px rgba(47,38,32,.32)}
.faq-item.fx.open{border-color:rgba(201,168,118,.7);
  background:linear-gradient(165deg,#FFFDF6,#F4ECDA)}
.faq-item.fx .faq-q{display:flex;align-items:center;gap:16px;width:100%;
  padding:20px 22px;border:none;background:none;cursor:pointer;text-align:left;
  font-family:inherit;font-size:16px;font-weight:600;color:var(--ink)}
.faq-item.fx .faq-i{font-size:11px;letter-spacing:.16em;color:var(--gold-d);
  font-weight:700;flex:none;width:26px}
.faq-item.fx .faq-t{flex:1;min-width:0}
.faq-item.fx .faq-icon{position:relative;flex:none;width:30px;height:30px;border-radius:50%;
  border:1px solid rgba(61,54,46,.2);background:rgba(255,252,244,.8);
  transition:transform .4s var(--ease),border-color .3s var(--ease),background .3s var(--ease)}
.faq-item.fx .faq-icon::before,.faq-item.fx .faq-icon::after{content:"";position:absolute;
  left:50%;top:50%;background:var(--ink-75);transition:background .3s var(--ease)}
.faq-item.fx .faq-icon::before{width:12px;height:1.6px;transform:translate(-50%,-50%)}
.faq-item.fx .faq-icon::after{width:1.6px;height:12px;transform:translate(-50%,-50%)}
.faq-item.fx.open .faq-icon{transform:rotate(135deg);border-color:var(--gold);
  background:linear-gradient(135deg,var(--gold-l),var(--gold))}
.faq-item.fx.open .faq-icon::before,.faq-item.fx.open .faq-icon::after{background:#2A211A}
.faq-item.fx .faq-a{max-height:0;overflow:hidden;
  transition:max-height .5s var(--ease)}
.faq-item.fx.open .faq-a{max-height:300px}
.faq-item.fx .faq-body{padding:0 22px 22px 64px;color:var(--ink-90);
  font-size:15px;line-height:1.6;font-weight:400;
  border-top:1px dashed rgba(201,168,118,.4);padding-top:16px;margin:0 22px 0 64px;
  padding-left:0;padding-right:0}
@media(max-width:560px){
  .faq-item.fx .faq-q{padding:16px 16px;font-size:14.5px;gap:12px}
  .faq-item.fx .faq-body{margin:0 16px 0 52px}
}
</style>

#dashWrap .glass{background:var(--glass);backdrop-filter:blur(22px) saturate(1.25);-webkit-backdrop-filter:blur(22px) saturate(1.25);border:1px solid var(--glass-brd);box-shadow:var(--sh-l)}
#dashWrap .topbar{position:sticky;top:0;z-index:60;background:rgba(251,248,242,.74);backdrop-filter:blur(18px);border-bottom:1px solid var(--line-s)}
#dashWrap .topbar-in{max-width:var(--maxw);margin:0 auto;padding:13px 26px;display:flex;align-items:center;justify-content:space-between;gap:18px}
#dashWrap .brand{display:flex;align-items:center;gap:10px;cursor:pointer}
#dashWrap .brand .owl{width:34px;height:36px;flex:none}
#dashWrap .brand-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:23px;letter-spacing:-.03em}
#dashWrap .nav-mid{display:flex;gap:24px}
#dashWrap .nav-mid a{font-size:14.5px;font-weight:500;color:var(--ink-70);transition:.2s}
#dashWrap .nav-mid a:hover{color:var(--ink)}
#dashWrap .nav-right{display:flex;align-items:center;gap:14px}
#dashWrap .demo-switch{display:flex;gap:3px;background:rgba(31,26,20,.06);padding:3px;border-radius:30px;border:1px solid var(--line-s)}
#dashWrap .dpill{font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:24px;color:var(--ink-50);transition:.2s}
#dashWrap .dpill:hover{color:var(--ink)}
#dashWrap .dpill.active{background:var(--espresso);color:var(--paper)}
#dashWrap .demo-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--ink-30);text-transform:uppercase}
#dashWrap .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:600;font-size:15px;padding:14px 24px;border-radius:40px;transition:.22s;letter-spacing:-.01em;white-space:nowrap}
#dashWrap .btn-pri{background:linear-gradient(135deg,var(--rust-l),var(--rust));color:var(--ivory);box-shadow:0 13px 30px -12px rgba(181,102,58,.75)}
#dashWrap .btn-pri:hover{transform:translateY(-1px)}
#dashWrap .btn-gold{background:linear-gradient(135deg,#E0C997,#C9A876 55%,#A0824F);color:var(--espresso);box-shadow:0 12px 30px -12px rgba(201,168,118,.85)}
#dashWrap .btn-gold:hover{transform:translateY(-1px)}
#dashWrap .btn-ghost{border:1px solid var(--line);color:var(--ink);background:rgba(255,253,247,.5)}
#dashWrap .btn-ghost:hover{border-color:var(--ink-30)}
#dashWrap .btn-danger{border:1px solid rgba(181,102,58,.4);color:var(--rust);background:rgba(181,102,58,.06)}
#dashWrap .btn-danger:hover{background:rgba(181,102,58,.12)}
#dashWrap .btn-sm{padding:10px 17px;font-size:13.5px}
#dashWrap .btn-lg{padding:17px 30px;font-size:16.5px}
#dashWrap .btn-block{width:100%}
#dashWrap .btn[disabled]{opacity:.4;pointer-events:none}
#dashWrap .ic{width:17px;height:17px}
#dashWrap .wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px}
#dashWrap .eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-d);font-weight:600}
#dashWrap .section{padding:90px 0}
#dashWrap .sec-head{max-width:30em}
#dashWrap .sec-head h2{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(32px,4.4vw,52px);font-weight:700;letter-spacing:-.035em;line-height:1.0;margin-top:14px}
#dashWrap .sec-head p{color:var(--ink-70);font-size:17px;margin-top:16px}
#dashWrap .tag{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:30px;background:var(--glass);border:1px solid var(--glass-brd);backdrop-filter:blur(10px)}
#dashWrap .dot{width:6px;height:6px;border-radius:50%;background:var(--positive)}
#dashWrap .stars{color:var(--gold-d);letter-spacing:1px}
#dashWrap .owl{display:block}
@keyframes headBob{0%,100%{transform:translate(0,0)}50%{transform:translate(0,-3px)}}
@keyframes wingFlutter{0%,100%{transform:rotate(0)}50%{transform:rotate(-3deg)}}
@keyframes blink{0%,90%,100%{transform:scaleY(1)}93%,97%{transform:scaleY(0.1)}}
#dashWrap .head-bob{animation:headBob 4s ease-in-out infinite}
#dashWrap .wing-l{animation:wingFlutter 3s ease-in-out infinite;transform-origin:right center;transform-box:fill-box}
#dashWrap .wing-r{animation:wingFlutter 3s ease-in-out infinite reverse;transform-origin:left center;transform-box:fill-box}
#dashWrap .owl-eye{animation:blink 5s ease-in-out infinite;transform-origin:center;transform-box:fill-box}
#dashWrap .owl-float{animation:owlFloat 5s ease-in-out infinite}
@keyframes owlFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
#dashWrap .rv{opacity:0;transform:translateY(16px);animation:rv .8s cubic-bezier(.2,.7,.2,1) forwards}
@keyframes rv{to{opacity:1;transform:none}}
#dashWrap .hero{padding:46px 0 26px}
#dashWrap .hero-grid{display:grid;grid-template-columns:1fr 480px;gap:50px;align-items:center}
#dashWrap .hero-l .h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(38px,5.3vw,66px);line-height:.97;letter-spacing:-.04em}
#dashWrap .hero-l .h1 em{font-style:normal;background:linear-gradient(120deg,#B5663A,#C9A876);-webkit-background-clip:text;background-clip:text;color:transparent}
#dashWrap .hero-l .lead{font-size:18px;color:var(--ink-70);max-width:27em;margin-top:22px;line-height:1.55}
#dashWrap .hero-trust{display:flex;align-items:center;gap:22px;margin-top:28px;flex-wrap:wrap}
#dashWrap .ht-item{font-size:13.5px;color:var(--ink-70);display:flex;align-items:center;gap:8px}
#dashWrap .ht-num{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;color:var(--ink)}
#dashWrap .hero-owl{position:absolute;right:6px;bottom:-30px;width:118px;z-index:2}
#dashWrap .calc{border-radius:26px;padding:26px;position:relative;overflow:hidden}
#dashWrap .calc-top{display:flex;align-items:center;gap:11px;margin-bottom:16px}
#dashWrap .calc-badge{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#E0C997,#C9A876);color:var(--espresso);display:grid;place-items:center;flex:none}
#dashWrap .calc-top h3{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700}
#dashWrap .calc-top p{font-size:12px;color:var(--ink-50)}
#dashWrap .calc-price{text-align:center;padding:14px 0 6px}
#dashWrap .calc-price .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-50);font-weight:600}
#dashWrap .calc-range{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(28px,4.6vw,40px);letter-spacing:-.03em;line-height:1.05;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
#dashWrap .calc-range .sep{color:var(--gold-d);font-weight:600}
#dashWrap .calc-delta{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;padding:3px 9px;border-radius:20px;margin-top:6px;opacity:0;transition:.3s;height:24px}
#dashWrap .calc-delta.up{background:rgba(94,124,79,.16);color:var(--positive);opacity:1}
#dashWrap .calc-delta.down{background:rgba(181,102,58,.14);color:var(--rust);opacity:1}
#dashWrap .acc{display:flex;align-items:center;gap:10px;margin:12px 0 4px}
#dashWrap .acc-bar{flex:1;height:6px;border-radius:6px;background:rgba(31,26,20,.10);overflow:hidden}
#dashWrap .acc-fill{height:100%;background:linear-gradient(90deg,var(--gold-l),var(--gold));border-radius:6px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
#dashWrap .acc-n{font-size:11.5px;font-weight:600;color:var(--ink-50);font-family:'JetBrains Mono',monospace}
#dashWrap .calc-sofia{display:flex;gap:10px;align-items:flex-start;background:var(--paper-2);border-radius:13px;padding:11px 13px;margin:12px 0}
#dashWrap .calc-sofia .so{flex:none;width:38px;height:38px;border-radius:50%;background:var(--ivory);border:1px solid var(--line);overflow:hidden;display:grid;place-items:center}
#dashWrap .calc-sofia .so svg{width:34px;height:34px;margin-top:6px}
#dashWrap .calc-sofia .tx{font-size:13px;color:var(--ink-70);line-height:1.4}
#dashWrap .calc-field{margin-bottom:11px}
#dashWrap .calc-field label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--ink-70)}
#dashWrap .calc-field label b{font-family:'JetBrains Mono',monospace;color:var(--ink)}
#dashWrap .calc-input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;background:rgba(255,253,247,.7);font-family:inherit;font-size:14.5px;color:var(--ink);transition:.2s}
#dashWrap .calc-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,168,118,.2)}
#dashWrap .chips{display:flex;flex-wrap:wrap;gap:7px}
#dashWrap .chip{padding:8px 13px;border:1.5px solid var(--line);border-radius:30px;font-size:13px;font-weight:600;background:rgba(255,253,247,.6);transition:.16s}
#dashWrap .chip:hover{border-color:var(--ink-30)}
#dashWrap .chip.sel{background:var(--espresso);color:var(--ivory);border-color:var(--espresso)}
#dashWrap .rng{width:100%;-webkit-appearance:none;height:6px;border-radius:6px;background:linear-gradient(90deg,var(--gold) var(--p,40%),rgba(31,26,20,.12) var(--p,40%));outline:none}
#dashWrap .rng::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--espresso);cursor:pointer;border:3px solid var(--ivory);box-shadow:var(--sh-s)}
#dashWrap .rng::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--espresso);cursor:pointer;border:3px solid var(--ivory)}
#dashWrap .calc-note{font-size:11.5px;color:var(--ink-50);text-align:center;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:7px}
#dashWrap .range-track{position:relative;height:8px;border-radius:8px;background:rgba(31,26,20,.10);margin:14px 0 8px}
#dashWrap .range-fill{position:absolute;left:9%;right:9%;top:0;bottom:0;border-radius:8px;background:linear-gradient(90deg,var(--gold-l),var(--gold),var(--rust-l))}
#dashWrap .range-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:var(--rust);border:3px solid var(--ivory);box-shadow:var(--sh-s)}
#dashWrap .range-labels{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-50);letter-spacing:.02em;margin-bottom:4px}
#dashWrap .range-labels .mid{color:var(--rust);font-weight:600}
#dashWrap .pv3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:42px}
#dashWrap .pv{border-radius:var(--r);padding:26px 24px;background:var(--glass);border:1px solid var(--glass-brd);backdrop-filter:blur(14px);display:flex;flex-direction:column}
#dashWrap .pv-h{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-50);font-weight:600}
#dashWrap .pv-v{font-family:'Bricolage Grotesque',sans-serif;font-size:32px;font-weight:700;letter-spacing:-.03em;margin:10px 0 14px;color:var(--ink-60)}
#dashWrap .pv.gold .pv-v{color:var(--ink)}
#dashWrap .pv-bar{height:8px;border-radius:8px;background:rgba(31,26,20,.10);overflow:hidden;margin-bottom:14px}
#dashWrap .pv-bar i{display:block;height:100%;background:rgba(31,26,20,.22);border-radius:8px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
#dashWrap .pv.gold .pv-bar i{background:var(--gold)}
#dashWrap .pv p{font-size:13px;color:var(--ink-70);line-height:1.5}
#dashWrap .pv.kuply{background:var(--clay-grad);color:var(--ivory);border:none;box-shadow:var(--sh-m);position:relative;overflow:hidden}
#dashWrap .pv.kuply::before{content:"";position:absolute;inset:0;background:radial-gradient(300px 180px at 90% -10%,rgba(224,201,151,.4),transparent 60%)}
#dashWrap .pv.kuply>*{position:relative;z-index:1}
#dashWrap .pv.kuply .pv-h{color:var(--gold-l)}
#dashWrap .pv.kuply .pv-v{color:var(--ivory)}
#dashWrap .pv.kuply .pv-bar{background:rgba(255,255,255,.22)}
#dashWrap .pv.kuply .pv-bar i{background:var(--gold-l)}
#dashWrap .pv.kuply p{color:rgba(255,253,247,.88)}
#dashWrap .pv.kuply p b{color:var(--gold-l)}
#dashWrap .doc-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--brd)}
#dashWrap .doc-row:last-of-type{border-bottom:none}
#dashWrap .doc-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
#dashWrap .doc-ic.ok{background:rgba(94,124,79,.16);color:var(--positive)}
#dashWrap .doc-ic.missing{background:rgba(201,168,118,.2);color:var(--gold-d)}
#dashWrap .doc-ic svg{width:15px;height:15px}
#dashWrap .upsell{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;border-radius:var(--r);padding:26px 30px;background:var(--clay-grad);color:var(--ivory);position:relative;overflow:hidden}
#dashWrap .upsell::before{content:"";position:absolute;inset:0;background:radial-gradient(380px 200px at 100% 120%,rgba(224,201,151,.4),transparent 60%)}
#dashWrap .upsell>*{position:relative;z-index:1}
#dashWrap .us-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-l);font-weight:600}
#dashWrap .upsell-owl{align-self:end}
@media(max-width:560px){#dashWrap .upsell{grid-template-columns:1fr}
#dashWrap .upsell-owl{display:none}}
#dashWrap .stats{border-top:1px solid var(--line-s);border-bottom:1px solid var(--line-s)}
#dashWrap .stats-in{max-width:var(--maxw);margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
#dashWrap .stat-b{padding:32px 26px;border-right:1px solid var(--line-s)}
#dashWrap .stat-b:last-child{border-right:none}
#dashWrap .stat-b .sv{font-family:'Bricolage Grotesque',sans-serif;font-size:38px;font-weight:700;letter-spacing:-.03em;line-height:1}
#dashWrap .stat-b .sl{font-size:13.5px;color:var(--ink-70);margin-top:6px}
#dashWrap .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:42px}
#dashWrap .step{border-radius:var(--r);padding:30px 26px;transition:.25s;position:relative}
#dashWrap .step:hover{transform:translateY(-4px)}
#dashWrap .step-n{position:absolute;top:22px;right:26px;font-family:'Bricolage Grotesque',sans-serif;font-size:44px;font-weight:800;color:rgba(201,168,118,.32);line-height:1}
#dashWrap .step-ic{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,rgba(224,201,151,.5),rgba(201,168,118,.3));display:grid;place-items:center;color:var(--gold-d);margin-bottom:18px}
#dashWrap .step h3{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;margin-bottom:9px;letter-spacing:-.02em}
#dashWrap .step p{font-size:14.5px;color:var(--ink-70)}
#dashWrap .guide{display:flex;align-items:center;gap:20px;margin-top:38px;border-radius:24px;padding:18px 30px 18px 18px;background:var(--clay-grad);color:var(--ivory);position:relative;overflow:hidden}
#dashWrap .guide::before{content:"";position:absolute;inset:0;background:radial-gradient(400px 200px at 8% 120%,rgba(201,168,118,.4),transparent 60%)}
#dashWrap .guide .g-owl{flex:none;position:relative;z-index:1}
#dashWrap .guide p{font-size:16px;line-height:1.5;position:relative;z-index:1}
#dashWrap .guide .hl{color:var(--gold-l);font-weight:600}
#dashWrap .bens{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
#dashWrap .ben{border-radius:var(--r);padding:28px 24px;transition:.25s}
#dashWrap .ben:hover{transform:translateY(-3px)}
#dashWrap .ben-ic{width:44px;height:44px;border-radius:12px;background:rgba(94,124,79,.14);color:var(--positive);display:grid;place-items:center;margin-bottom:16px}
#dashWrap .ben.up .ben-ic{background:rgba(201,168,118,.2);color:var(--gold-d)}
#dashWrap .ben h4{font-family:'Bricolage Grotesque',sans-serif;font-size:19px;font-weight:700;margin-bottom:8px}
#dashWrap .ben p{font-size:14px;color:var(--ink-70)}
#dashWrap .cmp{margin-top:30px;border-radius:var(--r);overflow:hidden}
#dashWrap .cmp table{width:100%;border-collapse:collapse;min-width:560px}
#dashWrap .cmp th,#dashWrap .cmp td{padding:16px 20px;text-align:left;font-size:14.5px;border-bottom:1px solid var(--line-s)}
#dashWrap .cmp thead th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-50);font-weight:600}
#dashWrap .cmp thead th.k{color:var(--gold-d)}
#dashWrap .cmp td.k{background:rgba(201,168,118,.10);font-weight:600}
#dashWrap .cmp th.k{background:rgba(201,168,118,.16)}
#dashWrap .cmp td:first-child{font-weight:600}
#dashWrap .cmp tr:last-child td{border-bottom:none}
#dashWrap .yes{color:var(--positive);font-weight:700}
#dashWrap .no{color:var(--ink-30)}
#dashWrap .sits{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
#dashWrap .sit{border-radius:var(--r-s);padding:24px 22px;transition:.2s}
#dashWrap .sit:hover{transform:translateY(-3px)}
#dashWrap .sit .si{color:var(--gold-d);margin-bottom:14px}
#dashWrap .sit h4{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
#dashWrap .sit p{font-size:13.5px;color:var(--ink-70)}
#dashWrap .tests{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
#dashWrap .test{border-radius:var(--r);padding:26px 24px;display:flex;flex-direction:column;gap:14px}
#dashWrap .test .stars{font-size:15px}
#dashWrap .test q{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:500;line-height:1.4}
#dashWrap .test q::before{content:"\201E"}
#dashWrap .test q::after{content:"\201C"}
#dashWrap .test-who{display:flex;align-items:center;gap:11px;margin-top:auto}
#dashWrap .test-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--sand),var(--gold-l));display:grid;place-items:center;font-weight:700;font-size:14px;color:var(--espresso)}
#dashWrap .test-who .n{font-size:14px;font-weight:600}
#dashWrap .test-who .m{font-size:12.5px;color:var(--ink-50)}
#dashWrap .partners{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:42px}
#dashWrap .partner{border-radius:var(--r);padding:30px 28px;display:flex;gap:18px;align-items:flex-start}
#dashWrap .partner .seal{width:56px;height:56px;border-radius:14px;flex:none;display:grid;place-items:center;background:var(--clay-grad);color:var(--gold-l)}
#dashWrap .partner h4{font-family:'Bricolage Grotesque',sans-serif;font-size:19px;font-weight:700;letter-spacing:-.01em}
#dashWrap .partner .role{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-d);font-weight:600;margin:2px 0 8px}
#dashWrap .partner p{font-size:13.5px;color:var(--ink-70);line-height:1.5}
#dashWrap .trust-vis{border-radius:24px;padding:34px;color:var(--ivory);position:relative;overflow:hidden;background:var(--clay-grad);margin-top:24px}
#dashWrap .trust-vis::before{content:"";position:absolute;inset:0;background:radial-gradient(500px 320px at 92% -10%,rgba(201,168,118,.45),transparent 60%)}
#dashWrap .tv-rel{position:relative;z-index:1}
#dashWrap .sem{display:flex;flex-direction:column;gap:12px;margin-top:20px}
#dashWrap .sem-row{display:flex;align-items:center;justify-content:space-between;font-size:14px}
#dashWrap .sem-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;background:rgba(94,124,79,.3);color:#cbe0b8}
#dashWrap .ref-band{display:grid;grid-template-columns:1.1fr 1fr;gap:40px;align-items:center;border-radius:26px;padding:46px 44px;position:relative;overflow:hidden}
#dashWrap .ref-steps{display:flex;flex-direction:column;gap:14px;margin-top:8px}
#dashWrap .ref-step{display:flex;gap:14px;align-items:flex-start}
#dashWrap .ref-step .num{width:30px;height:30px;border-radius:50%;background:var(--espresso);color:var(--gold-l);display:grid;place-items:center;font-weight:700;font-size:13px;flex:none;font-family:'JetBrains Mono',monospace}
#dashWrap .ref-step .t{font-size:14.5px}
#dashWrap .ref-step .t b{font-weight:700}
#dashWrap .ref-card{border-radius:20px;padding:28px;text-align:center;background:var(--clay-grad);color:var(--ivory);position:relative;overflow:hidden}
#dashWrap .ref-card::before{content:"";position:absolute;inset:0;background:radial-gradient(360px 220px at 80% 120%,rgba(201,168,118,.4),transparent 60%)}
#dashWrap .ref-card>*{position:relative;z-index:1}
#dashWrap .ref-card .big{font-family:'Bricolage Grotesque',sans-serif;font-size:46px;font-weight:800;letter-spacing:-.03em;background:linear-gradient(120deg,#E0C997,#C9A876);-webkit-background-clip:text;background-clip:text;color:transparent}
#dashWrap .faq{display:flex;flex-direction:column;gap:12px;max-width:820px}

#dashWrap .comp-row:last-of-type{border-bottom:none}
#dashWrap .comp-row .cm2{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-50)}
#dashWrap .fin-hero{background:linear-gradient(135deg,var(--gold-l),var(--gold));border-radius:16px;padding:16px 18px;box-shadow:var(--sh-s)}
#dashWrap .fin-hero .fh-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:rgba(47,38,32,.78)}
#dashWrap .fin-hero .fh-row b{color:var(--ink)}
#dashWrap .fin-hero .fh-big{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(47,38,32,.18);margin-top:8px;padding-top:10px;font-size:13px;font-weight:600;color:rgba(47,38,32,.8)}
#dashWrap .fin-hero .fh-big b{font-size:26px;font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;color:var(--ink)}
#dashWrap .bgsw{display:flex;gap:6px;margin-right:12px;padding:4px 5px;border:1px solid var(--brd);border-radius:20px;background:rgba(255,252,244,.6);align-items:center}
#dashWrap .bgs{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.9);cursor:pointer;box-shadow:0 1px 4px rgba(47,38,32,.25);padding:0;transition:.15s}
#dashWrap .bgs.on{border-color:var(--rust);box-shadow:0 0 0 2px rgba(181,102,58,.3)}
#dashWrap .b-room{background:var(--bg-dash) center/cover}
#dashWrap .b-light{background:var(--bg-light) center/cover}
#dashWrap .b-paper{background:linear-gradient(135deg,#FBF7EE,#E2D5B8)}
#dashWrap .app.bg-light::before{background-image:var(--bg-light)}
#dashWrap .app.bg-paper::before{display:none}
#dashWrap .modal{min-width:0}
#dashWrap .mgrid>div{min-width:0}
#dashWrap .mgrid .dpanel{min-width:0}
#dashWrap .prow .k,#dashWrap .prow .v{min-width:0}
#dashWrap .prow .v{overflow-wrap:anywhere}
#dashWrap .bid-in{min-width:0}
#dashWrap .bid-in input{min-width:0;width:100%}
@media(max-width:980px){#dashWrap .mgrid{grid-template-columns:1fr}
#dashWrap .modal.modal-xl{max-width:96vw}
#dashWrap .bgsw{display:none}}
@media(max-width:560px){#dashWrap .modal .modal-c{padding:18px 14px 22px}
#dashWrap .bid-opts{grid-template-columns:1fr}
#dashWrap .comp-row{grid-template-columns:1fr auto}
#dashWrap .comp-row .cm2{display:none}
#dashWrap .mthumbs img{width:42px;height:32px}
#dashWrap .dpanel-b{padding:6px 12px 10px}}
#dashWrap .app{position:relative}
#dashWrap .app::after{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none;background:linear-gradient(180deg,rgba(251,247,238,.50) 0%,rgba(251,247,238,.66) 40%,rgba(251,247,238,.80) 100%)}
#dashWrap .side{background:rgba(255,252,244,.42)!important;backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2)}
#dashWrap .dpanel{background:rgba(255,252,244,.62)}
#dashWrap .dstat{background:rgba(255,252,244,.60)}
#dashWrap .dfoot{background:rgba(255,252,244,.62)}
#dashWrap .deal-img,#dashWrap .modal-img,#dashWrap .preview{position:relative;overflow:hidden}
#dashWrap .dimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#dashWrap .dimg-grad{position:absolute;inset:0;background:linear-gradient(185deg,rgba(47,38,32,.05) 38%,rgba(47,38,32,.46))}
#dashWrap .img-chip{position:absolute;left:11px;bottom:11px;z-index:2;display:inline-flex;gap:7px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.13em;color:#FFFCF4;background:rgba(47,38,32,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:6px 11px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
#dashWrap .img-chip svg{width:13px;height:13px}
#dashWrap .rating,#dashWrap .deal-time{z-index:2}</style>
</head>

      p.addEventListener('click', function () { self.go(i); });
    });
    window.addEventListener('resize', function () { self.measure(); });
    document.addEventListener('keydown', function (e) {
      if (!self.root.isConnected) return;
      if (e.key === 'ArrowLeft') self.go(self.target - 1);
      if (e.key === 'ArrowRight') self.go(self.target + 1);
    });
    // drag / swipe s momentum
    var sx = 0, sp = 0;
    this.stage.addEventListener('pointerdown', function (e) {
      if (e.target.closest('input,button,a,textarea,select')) return;
      self.dragging = true; sx = e.clientX; sp = self.pos; self.vel = 0;
      var co = self.cards[Math.round(self.pos)].querySelector('[data-sofia]');
      if (co && window.SofiaCore) SofiaCore.set(co, 'thinking');
      try { self.stage.setPointerCapture(e.pointerId); } catch (err) {}
    });
    this.stage.addEventListener('pointermove', function (e) {
      if (!self.dragging) return;
      var np = sp - (e.clientX - sx) / self.spacing;
      self.vel = np - self.pos;
      self.pos = np;
    });
    function release() {
      if (!self.dragging) return;
      self.dragging = false;
      self.go(self.pos + self.vel * 7); // momentum dohoz
      if (Math.round(self.target) === self.lastAct) {
        var ro = self.cards[self.lastAct].querySelector('[data-sofia]');
        if (ro && window.SofiaCore) SofiaCore.set(ro, 'idle');
      }
    }
    this.stage.addEventListener('pointerup', release);
    this.stage.addEventListener('wheel', function (e) {
      if (Math.abs(e.deltaX) <= Math.abs(e.deltaY)) return; // svisly scroll necháváme stránce
      e.preventDefault();
      if (self._wl) return;
      self._wl = true; setTimeout(function () { self._wl = false; }, 260);
      self.go(self.target + (e.deltaX > 0 ? 1 : -1));
    }, { passive: false });
    this.stage.addEventListener('pointercancel', release);
    // klik na postranní kartu = zaostřit ji (ne akce)
    this.cards.forEach(function (c, i) {
      c.addEventListener('click', function (e) {
        if (Math.round(self.pos) !== i) {
          e.preventDefault(); e.stopPropagation(); self.go(i);
        }
      }, true);
    });
  };

  Car.prototype.loop = function () {
    var self = this;
    (function tick() {
      if (!self.root.isConnected) return; // úklid po odpojení (React unmount)

      requestAnimationFrame(tick);
    })();
  };

  Car.prototype.render = function () {
    var self = this, act = Math.round(this.pos);
    this.cards.forEach(function (c, i) {
      var off = i - self.pos, a = Math.abs(off);
      var tx = off * self.spacing;
      var rot = Math.max(-32, Math.min(32, off * -28));
      var tz = -140 * Math.min(a, 1.3);
      var sc = 1 - 0.13 * Math.min(a, 1.3);
      c.style.transform = 'translate3d(' + tx.toFixed(1) + 'px,0,' + tz.toFixed(1) + 'px) rotateY(' + rot.toFixed(2) + 'deg) scale(' + sc.toFixed(3) + ')';
      c.style.opacity = a > 1.7 ? '0' : String(Math.max(0, 1 - Math.min(a, 1) * 0.22 - Math.max(0, a - 1) * 0.5)).slice(0, 5);
      c.style.zIndex = String(100 - Math.round(a * 10));
      c.style.pointerEvents = a > 1.5 ? 'none' : 'auto';
      // jemné rozostření jen na desktopu a malé (výkonnostní pravidlo §8.1)
      c.style.filter = (a > 0.25 && window.innerWidth > 767 && !RM)
        ? 'blur(' + Math.min(1.6, a * 1.4).toFixed(2) + 'px)' : 'none';
      var veil = c.querySelector('.lc-veil');
      if (veil) veil.style.opacity = String(Math.min(0.5, a * 0.45));
      var sh = self.shadows[i];
      sh.style.transform = 'translate3d(' + tx.toFixed(1) + 'px,0,0) scale(' + (sc * (1 - 0.2 * Math.min(a, 1.5))).toFixed(3) + ')';
      sh.style.opacity = String(Math.max(0, 0.9 - a * 0.5));
    });
    this.pills.forEach(function (p, i) { p.classList.toggle('on', i === act); });
    if (act !== this.lastAct) {
      this.lastAct = act;
      var orb = this.cards[act] && this.cards[act].querySelector('[data-sofia]');
      if (orb && window.SofiaCore) SofiaCore.set(orb, 'alert');
    }
  };

  var live = [];
  window.Car3D = {
    scan: function () {
      document.querySelectorAll('[data-car3d]').forEach(function (r) {
        if (r.__car) return;
        r.__car = new Car(r);
        live.push(r.__car);
      });
    },
    get: function (i) { return live[i]; }
  };
  document.addEventListener('DOMContentLoaded', function () { window.Car3D.scan(); });
})();
</script>
<script>/* ============================================================
   KUPLY OS · PHASE 1 · SOFIA CORE v0 (engine)
   Orb: idle / thinking / alert · MutationObserver auto-mount
   Persona labels: 'Sofia' (warm zóny) · 'Kuply Intelligence' (dark, Phase 4)
   ============================================================ */
(function () {
  'use strict';
  var EYES = '<svg class="sf-owl" viewBox="0 0 300 320" aria-hidden="true"><use href="#owl-hero"></use></svg>';

  function build(el) {
    if (el.__sf) return;
    el.__sf = true;
    var size = parseInt(el.getAttribute('data-sf-size'), 10) ||
               parseInt(el.style.width, 10) || 40;
    el.classList.add('sf-mount');
    if (!el.style.width) { el.style.width = size + 'px'; el.style.height = size + 'px'; }
    var label = el.getAttribute('data-sf-label');
    el.innerHTML =
      '<div class="sf-aura"></div>' +
      '<svg class="sf-owlimg" viewBox="0 0 300 320" aria-hidden="true"><use href="#owl-happy"></use></svg>' +
      (label ? '<div class="sf-label">' + label + '</div>' : '');
    setState(el, el.getAttribute('data-sf-state') || 'idle');
  }

  function setState(el, s) {
    el.classList.remove('is-idle', 'is-thinking', 'is-alert');
    if (s === 'alert') {
      el.classList.add('is-idle', 'is-alert');
      setTimeout(function () { el.classList.remove('is-alert'); }, 950);
    } else {
      el.classList.add('is-' + s);
    }
  }

  function hoistDefs() {
    var d = document.getElementById('owl-hero');
    if (!d) return;
    var s = d.closest('svg');
    if (s && s.parentElement !== document.body) {
      s.setAttribute('style', 'position:absolute;width:0;height:0;overflow:hidden');
      document.body.insertBefore(s, document.body.firstChild);
    }
  }

  var mo = null;
  window.SofiaCore = {
    scan: function () {
      hoistDefs();
      document.querySelectorAll('[data-sofia]').forEach(build);
    },
    set: function (el, s) {
      if (typeof el === 'string') el = document.querySelector(el);
      if (el) setState(el, s);
    },
    observe: function () {
      if (mo) return;
      mo = new MutationObserver(function () { window.SofiaCore.scan(); });
      mo.observe(document.body, { childList: true, subtree: true });
    }
  };
  document.addEventListener('DOMContentLoaded', function () {
    window.SofiaCore.scan();
    window.SofiaCore.observe();
  });
})();
</script>
<script>/* ============================================================
   KUPLY OS · SOFIA FLIGHT — živá entita doprovázející scroll
   Lerp setrvačnost · náklon dle rychlosti · trail · bubliny u sekcí ·
   dock u otevřené konzole · klik = otevření Sofi chatu
   ============================================================ */
(function () {
  'use strict';
  var RM = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;

  function init() {
    if (document.getElementById('sofiaFlight')) return;
    if (!document.querySelector('[data-car3d]') && !document.querySelector('#root')) return;

    var mob = window.innerWidth < 768;
    var SIZE = mob ? 64 : 104;
    var host = document.createElement('div');
    host.id = 'sofiaFlight';
    host.innerHTML =
      '<div class="sfl-trail t3"></div><div class="sfl-trail t2"></div><div class="sfl-trail t1"></div>' +
      '<svg class="sfl-owl" viewBox="0 0 320 240" width="' + Math.round(SIZE * 1.7) + '" height="' + Math.round(SIZE * 1.7 * 240 / 320) + '" aria-label="Sofia"><use href="#owl-fly"></use></svg>' +
      '<div class="sfl-bubble" id="sflBubble"></div>' +
      '<div class="sfl-tag">SOFIA</div>';
    document.body.appendChild(host);
    if (window.SofiaCore) SofiaCore.scan();

    var owlEl = host.querySelector('.sfl-owl');
    var bubble = host.querySelector('#sflBubble');
    var trails = [].slice.call(host.querySelectorAll('.sfl-trail'));
    var cx = -Math.min(window.innerWidth * 0.30, 360), cy = window.innerHeight * 0.30;
    var vx = 0, vy = 0, prevX = cx, prevY = cy;
    var trailP = [[cx, cy], [cx, cy], [cx, cy]];
    var lastT = performance.now(), idleT = 0, speed = 0;
    var mX = 0, mY = 0, mAct = -9999;
    var focusEl = null, focusUntil = 0;
    window.addEventListener('mousemove', function (e) { mX = e.clientX; mY = e.clientY; mAct = performance.now(); }, { passive: true });

    // klik na entitu -> otevřít existující Sofi chat
    host.addEventListener('click', function () {
      var btn = document.querySelector('.floating-sofi-btn');
      if (btn) btn.click();
    });

    // kontextové promluvy u sekcí
    function say(txt, ms) {
      bubble.classList.add('on');
      clearTimeout(bubble.__t); clearInterval(bubble.__type);
      bubble.textContent = '';
      var i = 0;
      bubble.__type = setInterval(function () {
        bubble.textContent = txt.slice(0, ++i);
        if (i >= txt.length) clearInterval(bubble.__type);
      }, 45);
      bubble.__t = setTimeout(function () { bubble.classList.remove('on'); }, (ms || 3200) + txt.length * 45);
    }
    var SAYS = [
      ['Každý kupec', 'Tři pohledy na cenu. Tři typy kupců.'],
      ['Jak', 'Provedu vás od rozboru k penězům v úschově.'],
      ['Příběhy', 'Skuteční majitelé. Skutečné výsledky.'],
      ['otázky', 'Jsem tu pro vás 24/7.']
    ];
    var seen = {};
    var io = new IntersectionObserver(function (es) {
      es.forEach(function (e) {
        if (!e.isIntersecting) return;
        var t = (e.target.textContent || '');
        SAYS.forEach(function (s, i) {
          if (!seen[i] && t.indexOf(s[0]) > -1) { seen[i] = 1; say(s[1]); }
        });
      });
    }, { threshold: 0.6 });
    document.querySelectorAll('#root h2').forEach(function (h) { io.observe(h); });
    // Sofi přiletí k hlavnímu CTA a řekne, co bude dál a proč
    var CTASAYS = [
      ['privátní rozbor', 'Dál ti zpřesním cenu z ±15 % na ±3 % a pustím k tobě investory — konkrétní kupec o tvůj byt zaplatí víc než portálový průměr.'],
      ['nabídky od investor', 'Teď to spustím: prověření investoři pošlou závazné nabídky. Nejvyšší klidně překoná i odhad.'],
      ['půjč', 'Dál ti seženu nabídky půjček proti nemovitosti. Nemovitost ti zůstává — jen ji dáš do zástavy.'],
      ['Začít rozbor', 'Pojď do toho — provedu tě krok za krokem až k penězům v úschově.']
    ];
    var seenCta = {};
    var ctaio = new IntersectionObserver(function (es) {
      es.forEach(function (e) {
        if (!e.isIntersecting) return;
        var t = (e.target.textContent || '');
        for (var i = 0; i < CTASAYS.length; i++) {
          if (!seenCta[CTASAYS[i][0]] && t.indexOf(CTASAYS[i][0]) > -1) { seenCta[CTASAYS[i][0]] = 1; focusEl = e.target; focusUntil = performance.now() + 7000; say(CTASAYS[i][1], 5600); break; }
        }
      });
    }, { threshold: 1 });
    function scanCtas() { document.querySelectorAll('#root .btn-primary, #root .btn-gold.btn-lg, #root .btn-pri.btn-lg').forEach(function (b) { if (!b.__ctaObs) { b.__ctaObs = 1; ctaio.observe(b); } }); }
    scanCtas(); setInterval(scanCtas, 1500);
    setTimeout(function () { say('Dobrý den, jsem Sofia. Provedu vás.', 3600); }, 1600);

    var rt = document.getElementById('root');
    (function tick() {
      var now = performance.now();
      var dt = Math.min(150, now - lastT); lastT = now;

      // viditelnost jen na landingu
      var landing = !rt || rt.style.display !== 'none';
      host.style.display = landing ? '' : 'none';
      if (!landing) { requestAnimationFrame(tick); return; }

      var vw = window.innerWidth, vh = window.innerHeight, mob = vw < 768;
      var tx, ty;

      var fr = (focusEl && now < focusUntil) ? focusEl.getBoundingClientRect() : null;
      var cw = document.querySelector('.console-wrap');
      if (fr && fr.bottom > 8 && fr.top < vh - 8) {
        // přiletět NAD aktivní CTA, ne přes něj
        var rpx = Math.min(46, Math.max(14, vw * 0.03));
        tx = (fr.left + fr.width * 0.55) - (vw - rpx) + SIZE * 0.85;
        ty = Math.max(56, fr.top - SIZE * 1.4);
      } else if (cw) {
        // dock u otevřené konzole
        var r = cw.getBoundingClientRect();
        tx = -Math.min(vw * 0.30, 340);
        ty = Math.min(vh - 120, Math.max(86, r.top + 26));
      } else {
        // sleduj kurzor s VELKÝM odstupem (trailing dolů-vlevo) — ať neblokuje texty/tlačítka
        var de = document.documentElement;
        var prog = Math.max(0, Math.min(1, window.scrollY / Math.max(1, de.scrollHeight - vh)));
        var ox = vw - Math.min(46, Math.max(14, vw * 0.03));
        if (now - mAct < 3200 && !mob) {
          tx = (mX - ox) - SIZE * 0.5 - 84;
          ty = mY - SIZE * 0.5 + 96 + Math.sin(now / 2200) * 5;
        } else {
          tx = -(12 + Math.sin(now / 2700) * 6);
          ty = vh * (0.30 + 0.26 * prog) + Math.sin(now / 2200) * 14;
        }
      }

      // bezpečná zóna (nepřekrýt obsah vlevo)
      tx = Math.max(-Math.min(vw * (mob ? 0.62 : 0.46), 540), Math.min(-6, tx));
      ty = Math.max(60, Math.min(vh - 96, ty));

      // setrvačné dojetí na obou osách (lerp s inercií)
      var k = RM ? 1 : 1 - Math.pow(0.93, dt / 16.7);
      prevX = cx; prevY = cy;
      cx += (tx - cx) * k; cy += (ty - cy) * k;
      vx = cx - prevX; vy = cy - prevY;
      speed = Math.abs(vx) + Math.abs(vy);
      idleT = speed < 0.35 ? idleT + dt : 0;

      // náklon sovy do směru letu + jemné dýchání
      var tilt = Math.max(-16, Math.min(16, vx * 0.6 + vy * 0.42));
      var pulse = RM ? 1 : 1 + Math.sin(now / 1400) * 0.025;
      host.style.transform = 'translate3d(' + cx.toFixed(1) + 'px,' + cy.toFixed(1) + 'px,0)';
      owlEl.style.transform = 'rotate(' + tilt.toFixed(1) + 'deg) scale(' + pulse.toFixed(3) + ')';

      // 2D comet trail
      trails.forEach(function (tr, i) {
        var lag = RM ? 1 : Math.min(1, (0.16 - i * 0.04) * (dt / 16.7));
        trailP[i][0] += (cx - trailP[i][0]) * lag;
        trailP[i][1] += (cy - trailP[i][1]) * lag;
        tr.style.transform = 'translate3d(' + (trailP[i][0] - cx).toFixed(1) + 'px,' + (trailP[i][1] - cy).toFixed(1) + 'px,0)';
        tr.style.opacity = String(Math.min(0.5, speed * 0.06 + 0.05));
      });

      requestAnimationFrame(tick);
    })();
  }

  document.addEventListener('DOMContentLoaded', init);
  var n = 0, iv = setInterval(function () {
    init(); if (document.getElementById('sofiaFlight') || ++n > 40) clearInterval(iv);
  }, 150);
})();
</script>
<script>/* ============================================================
   KUPLY OS · CINEMATIC FOOTER ENGINE
   Portal: footer ven z #root pod obsah · parallax obřího loga ·
   magnetické pilulky · back-to-top. Pouze transform/opacity, rAF.
   ============================================================ */
(function () {
  'use strict';
  var RM = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;

  function init() {
    var f = document.getElementById('cineFooter');
    if (!f || f.__cine) return;
    f.__cine = true;

    // PORTAL: ven z React rootu, aby obsah (z-2) plul nad fixovaným footerem (z-1)
    if (f.parentElement !== document.body) document.body.appendChild(f);
    var sp0 = document.querySelector('.cine-spacer');
    if (sp0 && sp0.parentElement !== document.body) document.body.appendChild(sp0);

    var giant = document.getElementById('cineGiant');
    var spacer = document.querySelector('.cine-spacer');
    var topBtn = f.querySelector('.cine-top');
    if (topBtn) topBtn.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // footer CTA pilulky -> nahoru ke karuselu formulářů
    f.querySelectorAll('a.cine-pill[href="#top"]').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    // magnetické pilulky (lerp k pozici kurzoru, ±9 px)
    var mags = [].slice.call(f.querySelectorAll('[data-mag]')).map(function (el) {
      return { el: el, x: 0, y: 0, tx: 0, ty: 0 };
    });
    f.addEventListener('mousemove', function (e) {
      mags.forEach(function (m) {
        var r = m.el.getBoundingClientRect();
        var dx = e.clientX - (r.left + r.width / 2);
        var dy = e.clientY - (r.top + r.height / 2);
        var dist = Math.hypot(dx, dy);
        var range = Math.max(r.width, 90) * 1.4;
        if (dist < range) { m.tx = dx / range * 9; m.ty = dy / range * 9; }
        else { m.tx = 0; m.ty = 0; }
      });
    });
    f.addEventListener('mouseleave', function () {
      mags.forEach(function (m) { m.tx = 0; m.ty = 0; });
    });

    var pg = -1;
    (function tick() {
      // parallax obřího KUPLY podle odhalení spaceru
      if (spacer && giant && !RM) {
        var r = spacer.getBoundingClientRect();
        var vh = window.innerHeight;
        var p = Math.min(1, Math.max(0, (vh - r.top) / (r.height + vh * 0.0001)));
        if (Math.abs(p - pg) > 0.002) {
          pg = p;
          var y = (1 - p) * 14; // vh
          giant.style.transform = 'translate3d(-50%,' + y.toFixed(2) + 'vh,0) scale(' + (0.94 + p * 0.06).toFixed(3) + ')';
        }
      }
      if (!RM) mags.forEach(function (m) {
        m.x += (m.tx - m.x) * 0.18; m.y += (m.ty - m.y) * 0.18;
        if (Math.abs(m.x) > 0.05 || Math.abs(m.y) > 0.05 || m.tx || m.ty)
          m.el.style.transform = 'translate3d(' + m.x.toFixed(1) + 'px,' + m.y.toFixed(1) + 'px,0)';
      });
      requestAnimationFrame(tick);
    })();

    // v dashboardech footer schovat (řídí se viditelností landing rootu)
    var rt = document.getElementById('root');
    setInterval(function () {
      var landing = !rt || rt.style.display !== 'none';
      f.style.display = landing ? '' : 'none';
      if (spacer) spacer.style.display = landing ? '' : 'none';
    }, 400);
  }

  document.addEventListener('DOMContentLoaded', init);
  // React mount může proběhnout po DOMContentLoaded
  var n = 0, iv = setInterval(function () {
    init(); if (document.getElementById('cineFooter') || ++n > 40) clearInterval(iv);
  }, 150);
})();
</script>
<script>/* ============================================================
   KUPLY OS · P3 WOW engine
   1) word-appear reveal hero H1   2) živý digit ticker (jen
   změněné číslice)   3) mouse sheen na tmavé kartě
   ============================================================ */
(function () {
  'use strict';
  var RM = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---- 1) word-appear: obalit slova H1, zachovat #cycleWord jako celek ---- */
  function wrapWords() {
    var h1 = document.querySelector('#root h1');
    if (!h1 || h1.dataset.wa) return;
    h1.dataset.wa = '1';
    var idx = 0;
    function delay() { return 0.06 + (idx++) * 0.05; }
    [].slice.call(h1.childNodes).forEach(function (node) {
      if (node.nodeType === 3) {
        var frag = document.createDocumentFragment();
        node.textContent.split(/(\s+)/).forEach(function (part) {
          if (!part) return;
          if (/^\s+$/.test(part)) { frag.appendChild(document.createTextNode(part)); return; }
          var s = document.createElement('span');
          s.className = 'wa'; s.textContent = part;
          s.style.setProperty('--d', delay().toFixed(2) + 's');
          frag.appendChild(s);
        });
        h1.replaceChild(frag, node);
      } else if (node.nodeType === 1 && node.tagName !== 'BR') {
        if (node.id === 'cycleWord' || node.querySelector('#cycleWord')) { idx++; return; }
        node.classList.add('wa');
        node.style.setProperty('--d', delay().toFixed(2) + 's');
      }
    });
  }

  /* ---- 2) digit ticker (vzor AnimateNumber: animují se jen změny) ---- */
  function fmt(n) { return n.toLocaleString('cs-CZ'); }
  function renderNum(el, val) {
    var chars = fmt(val).split('');
    var slots = el.__slots || [];
    // sloty klíčované zprava, ať jednotky drží identitu
    var out = [];
    for (var i = 0; i < chars.length; i++) {
      var key = chars.length - 1 - i, ch = chars[i];
      var slot = slots[key];
      if (!slot) {
        slot = document.createElement('span');
        slot.className = 'kn-slot';
        slot.innerHTML = '<span class="kn-l"></span>';
        slot.__ch = null;
        slots[key] = slot;
      }
      out.push(slot);
      if (slot.__ch !== ch) {
        var inner = slot.querySelector('.kn-l:not(.kn-out)');
        if (slot.__ch !== null && !RM) {
          var old = document.createElement('span');
          old.className = 'kn-l kn-out';
          old.textContent = slot.__ch;
          slot.appendChild(old);
          setTimeout(function (o) { return function () { o.remove(); }; }(old), 520);
          inner.classList.remove('kn-in');
          void inner.offsetWidth;
          inner.classList.add('kn-in');

function condF(c){return {'Novostavba/po rekonstrukci':1.06,'Dobrý stav':1,'Původní stav':0.9,'Před rekonstrukcí':0.8}[c]||1;}

function calcN(){return Object.keys(store.calc.touched).length;}
function calcAcc(){return Math.min(100,34+calcN()*12);}
function calcRange(){const est=calcEst();const half=Math.max(0.045,0.16-calcN()*0.022);return [est*(1-half),est,est*(1+half+0.02)];}
function priceViews(){const est=calcEst();return {portal:est,banka:est*0.83,kuply:est*1.085};}
function estimate(d){return Math.round(DISTRICTS[d.district]*d.m2*condF(d.condition)/10000)*10000;}
function gradeProp(p){let y=4.0+({'Před rekonstrukcí':1.5,'Původní stav':0.9,'Dobrý stav':0.3,'Novostavba/po rekonstrukci':-0.2}[p.condition]||0);y+=(DISTRICTS[p.district]>120000?-0.3:DISTRICTS[p.district]<80000?0.6:0.1);y=Math.round(y*10)/10;const g=y>=5.4?'A+':y>=4.7?'A':y>=4.0?'B':'C';return{g,y};}

function calcCard(){const c=store.calc;return `<div class="calc glass">
